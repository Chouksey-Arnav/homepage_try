<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCrick AI — Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <!-- Audio -->
  <audio id="bg-music" loop>
    <source src="quietphase-ambient-calm-491578.mp3" type="audio/mpeg" />
  </audio>

  <!-- Mute Button -->
  <button id="mute-btn" aria-label="Toggle music">
    <div id="speaker-icon"></div>
  </button>

  <!-- Main App Shell -->
  <div id="app" class="app-shell">
    <div id="screen" class="screen-wrapper"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
