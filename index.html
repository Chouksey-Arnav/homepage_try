<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SmartCrick AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ─────────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --brand:        #3D7A5F;
  --brand-light:  #5A9978;
  --brand-pale:   #E6F2EC;
  --brand-check:  #3D7A5F;

  --bg:           #F8FAF8;
  --surface:      #FFFFFF;

  --txt-primary:  #111C17;
  --txt-sub:      #5A7A6A;
  --txt-muted:    #96B3A5;

  --card-border:  #E2EDE7;
  --card-shadow:  rgba(30, 70, 50, 0.06);

  --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
}

html, body {
  height: 100%;
  font-family: 'Nunito', system-ui, sans-serif;
  background: var(--bg);
  color: var(--txt-primary);
  -webkit-font-smoothing: antialiased;
  overflow: hidden; /* prevent scroll flash during transitions */
}

/* ─────────────────────────────────────────────
   BACKGROUND ORBS  (Tiimo-style soft depth)
───────────────────────────────────────────── */
.orb {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  filter: blur(80px);
  will-change: transform;
  opacity: 1;
}
.orb-a {
  width: 540px; height: 540px;
  top: -160px; right: -160px;
  background: radial-gradient(circle, rgba(100,185,140,0.18) 0%, transparent 65%);
  animation: floatA 20s ease-in-out infinite;
}
.orb-b {
  width: 420px; height: 420px;
  bottom: -100px; left: -120px;
  background: radial-gradient(circle, rgba(90,153,120,0.14) 0%, transparent 65%);
  animation: floatB 26s ease-in-out infinite;
}
.orb-c {
  width: 300px; height: 300px;
  top: 42%; left: 60%;
  background: radial-gradient(circle, rgba(120,200,160,0.12) 0%, transparent 65%);
  animation: floatC 18s ease-in-out infinite;
}
@keyframes floatA {
  0%,100% { transform: translate(0,0); }
  40%     { transform: translate(20px,-30px); }
  70%     { transform: translate(-15px,18px); }
}
@keyframes floatB {
  0%,100% { transform: translate(0,0); }
  35%     { transform: translate(-25px,-20px); }
  70%     { transform: translate(18px,25px); }
}
@keyframes floatC {
  0%,100% { transform: translate(0,0); }
  50%     { transform: translate(12px,-18px); }
}

/* ─────────────────────────────────────────────
   MUTE BUTTON
───────────────────────────────────────────── */
#mute-btn {
  position: fixed;
  top: 18px; right: 18px;
  z-index: 200;
  width: 46px; height: 46px;
  border-radius: 50%;
  background: rgba(255,255,255,0.72);
  backdrop-filter: blur(14px) saturate(1.4);
  -webkit-backdrop-filter: blur(14px) saturate(1.4);
  border: 1.5px solid rgba(180,220,200,0.55);
  box-shadow: 0 4px 20px rgba(40,80,60,0.08);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
}
#mute-btn:hover  { transform: scale(1.1); box-shadow: 0 8px 28px rgba(40,80,60,0.14); }
#mute-btn:active { transform: scale(0.93); }

/* ─────────────────────────────────────────────
   STAGE  — the full-screen container
───────────────────────────────────────────── */
#stage {
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 28px 22px 40px;
  overflow: hidden;
}

/* ─────────────────────────────────────────────
   SCREEN PANEL  — the inner content card
───────────────────────────────────────────── */
#screen {
  width: 100%;
  max-width: 520px;
  will-change: opacity, transform;
}

/* Transition states */
#screen.fade-out {
  animation: screenOut 0.46s var(--ease-out) forwards;
}
#screen.fade-in {
  animation: screenIn 0.72s var(--ease-out) forwards;
}
@keyframes screenOut {
  from { opacity: 1; transform: translateY(0)   scale(1); }
  to   { opacity: 0; transform: translateY(-16px) scale(0.984); }
}
@keyframes screenIn {
  from { opacity: 0; transform: translateY(22px) scale(0.988); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}

/* ─────────────────────────────────────────────
   WELCOME SCREEN
───────────────────────────────────────────── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.logo-wrap {
  margin-bottom: 32px;
  animation: breathe 5s ease-in-out infinite;
}
.logo-wrap img {
  width: 100px; height: 100px;
  border-radius: 26px;
  object-fit: contain;
  box-shadow:
    0 20px 60px rgba(40,100,70,0.18),
    0 4px 16px rgba(40,100,70,0.10);
}
@keyframes breathe {
  0%,100% { transform: translateY(0) scale(1); }
  50%     { transform: translateY(-5px) scale(1.025); }
}

.welcome-tag {
  font-size: 0.8rem;
  font-weight: 800;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--brand-light);
  margin-bottom: 14px;
}

.welcome-h1 {
  font-size: clamp(2.4rem, 9vw, 3.4rem);
  font-weight: 900;
  color: var(--txt-primary);
  line-height: 1.08;
  letter-spacing: -0.03em;
  margin-bottom: 18px;
}

.welcome-p {
  font-size: clamp(0.95rem, 2.6vw, 1.05rem);
  font-weight: 600;
  color: var(--txt-sub);
  line-height: 1.7;
  max-width: 360px;
  margin-bottom: 44px;
}

.pill-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 17px 46px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  font-family: inherit;
  font-size: 1.05rem;
  font-weight: 800;
  color: #fff;
  background: var(--brand);
  box-shadow:
    0 12px 38px rgba(40,100,70,0.26),
    0 3px 10px rgba(40,100,70,0.14),
    inset 0 1px 0 rgba(255,255,255,0.14);
  transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out), background 0.2s;
  position: relative; overflow: hidden;
}
.pill-btn::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: linear-gradient(180deg, rgba(255,255,255,0.09) 0%, transparent 55%);
  pointer-events:none;
}
.pill-btn:hover  {
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 20px 52px rgba(40,100,70,0.3), 0 6px 16px rgba(40,100,70,0.16);
  background: var(--brand-light);
}
.pill-btn:active { transform: scale(0.96); }

/* ─────────────────────────────────────────────
   QUIZ SCREEN
───────────────────────────────────────────── */
.quiz {
  display: flex;
  flex-direction: column;
}

/* Progress */
.prog-track {
  width: 100%;
  height: 4px;
  border-radius: 999px;
  background: rgba(150,190,170,0.22);
  overflow: hidden;
  margin-bottom: 10px;
}
.prog-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--brand-light), var(--brand));
  transition: width 0.9s var(--ease-out);
}
.prog-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 36px;
}
.prog-cat {
  font-size: 0.7rem;
  font-weight: 900;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--brand-light);
}
.prog-num {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--txt-muted);
}

/* Question */
.q-text {
  font-size: clamp(1.65rem, 6vw, 2.35rem);
  font-weight: 900;
  color: var(--txt-primary);
  line-height: 1.18;
  letter-spacing: -0.025em;
  margin-bottom: 28px;
}

/* Options */
.opts {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 32px;
}

.opt {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 17px 18px;
  border-radius: 22px;
  background: var(--surface);
  border: 2px solid var(--card-border);
  box-shadow: 0 2px 12px var(--card-shadow);
  cursor: pointer;
  font-family: inherit;
  font-size: clamp(0.88rem, 2.5vw, 0.97rem);
  font-weight: 700;
  color: var(--txt-sub);
  text-align: left;
  line-height: 1.45;
  transition:
    border-color 0.22s var(--ease-out),
    box-shadow   0.22s var(--ease-out),
    transform    0.18s var(--ease-out),
    background   0.22s var(--ease-out),
    color        0.18s var(--ease-out);
  -webkit-tap-highlight-color: transparent;
  position: relative; overflow: hidden;
}
/* subtle inner highlight */
.opt::before {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: linear-gradient(160deg, rgba(255,255,255,0.7) 0%, transparent 45%);
  pointer-events:none;
}
.opt:hover:not(.picked) {
  border-color: rgba(100,180,140,0.45);
  box-shadow: 0 6px 24px rgba(40,100,70,0.09);
  transform: translateY(-1px);
  color: var(--txt-primary);
}
.opt:active { transform: scale(0.982); }

.opt.picked {
  border-color: var(--brand);
  border-width: 2.5px;
  background: var(--brand-pale);
  color: var(--txt-primary);
  box-shadow: 0 6px 28px rgba(40,100,70,0.13);
  transform: scale(1.005);
}

/* Check circle */
.chk {
  flex-shrink: 0;
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 2px solid var(--card-border);
  display: flex; align-items: center; justify-content: center;
  transition:
    border-color 0.22s var(--ease-out),
    background   0.22s var(--ease-out),
    transform    0.22s var(--ease-out);
}
.opt.picked .chk {
  border-color: var(--brand);
  background: var(--brand);
  transform: scale(1.12);
}
.chk svg { display: none; }
.opt.picked .chk svg { display: block; }

.opt-label { flex: 1; }

/* Back button */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 9px 16px 9px 10px;
  border-radius: 999px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 800;
  color: var(--txt-muted);
  transition: color 0.18s, background 0.18s, transform 0.18s var(--ease-out);
}
.back-btn:hover  { color: var(--txt-sub); background: rgba(150,190,170,0.15); transform: translateX(-2px); }
.back-btn:active { transform: scale(0.94); }
.back-btn.hidden { visibility: hidden; pointer-events: none; }

/* ─────────────────────────────────────────────
   DONE SCREEN
───────────────────────────────────────────── */
.done {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.done-icon {
  width: 82px; height: 82px;
  border-radius: 50%;
  background: var(--brand);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 30px;
  box-shadow: 0 16px 50px rgba(40,100,70,0.28), 0 4px 14px rgba(40,100,70,0.14);
  animation: popIn 0.7s var(--ease-out) both;
}
@keyframes popIn {
  0%   { transform: scale(0.35); opacity: 0; }
  65%  { transform: scale(1.12); opacity: 1; }
  100% { transform: scale(1);    opacity: 1; }
}

.done-logo {
  width: 58px; height: 58px;
  border-radius: 16px;
  object-fit: contain;
  margin-bottom: 22px;
  opacity: 0.9;
  box-shadow: 0 6px 24px rgba(40,100,70,0.14);
}

.done-h2 {
  font-size: clamp(2rem, 8vw, 3rem);
  font-weight: 900;
  color: var(--txt-primary);
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 16px;
}
.done-body {
  font-size: clamp(0.93rem, 2.6vw, 1.05rem);
  font-weight: 600;
  color: var(--txt-sub);
  line-height: 1.7;
  max-width: 360px;
  margin: 0 auto 10px;
}
.done-hint {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--txt-muted);
  margin-bottom: 40px;
  line-height: 1.6;
}

/* ─────────────────────────────────────────────
   FOOTER WATERMARK
───────────────────────────────────────────── */
.wm {
  position: fixed; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  font-size: 0.65rem; font-weight: 800;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(100,160,130,0.35);
  pointer-events: none; z-index: 5; white-space: nowrap;
}

/* ─────────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────────── */
@media (max-width: 420px) {
  #stage   { padding: 20px 16px 40px; }
  .q-text  { margin-bottom: 22px; }
  .opts    { gap: 8px; }
  .opt     { padding: 15px 14px; border-radius: 18px; }
}
@media (min-height: 850px) {
  .q-text  { margin-bottom: 34px; }
}
</style>
</head>
<body>

<!-- Background orbs -->
<div class="orb orb-a"></div>
<div class="orb orb-b"></div>
<div class="orb orb-c"></div>

<!-- Audio -->
<audio id="bgm" loop preload="none">
  <source src="quietphase-ambient-calm-491578.mp3" type="audio/mpeg"/>
</audio>

<!-- Mute toggle -->
<button id="mute-btn" aria-label="Toggle music" title="Toggle music"></button>

<!-- Main stage -->
<div id="stage">
  <div id="screen"></div>
</div>

<!-- Watermark -->
<div class="wm">SmartCrick AI — Train Like a Champion</div>

<script>
/* ═══════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════ */
const Qs = [
  { cat:"Getting to Know You",    q:"First things first — how would you describe your cricket journey so far?",    opts:["Just getting started — I'm brand new to cricket","I've played casually with friends or in school","I play regularly at a competitive club level","I'm a seasoned player with years of serious experience"] },
  { cat:"Getting to Know You",    q:"How many years have you been playing cricket?",                                opts:["Less than 1 year","1–3 years","3–7 years","7+ years"] },
  { cat:"Your Playing Identity",  q:"When you step onto the field, what role feels most like you?",                opts:["Batsman — I live for runs","Bowler — I love taking wickets","All-rounder — I do it all","Wicket-keeper — the gloves are my home"] },
  { cat:"Your Playing Identity",  q:"Which batting style feels natural to you?",                                   opts:["Right-handed batsman","Left-handed batsman","I'm comfortable with both","I'm still figuring it out"] },
  { cat:"Your Playing Identity",  q:"If you bowl, what's your style?",                                            opts:["Fast bowling — pace and aggression","Medium pace — swing and seam","Spin bowling — flight and turn","I don't bowl much, I focus on batting"] },
  { cat:"Your Playing Identity",  q:"Where do you prefer to bat in the order?",                                   opts:["Opening — I set the tone","Top order (3–4) — I anchor the innings","Middle order (5–6) — I adapt to situations","Lower order (7+) — I finish or support"] },
  { cat:"Your Playing Identity",  q:"Which cricket format excites you the most?",                                  opts:["T20 — explosive and fast-paced","ODI — the perfect balance","Test cricket — patience, grit, and glory","I love all formats equally"] },
  { cat:"Your Personality",       q:"How would you describe your playing temperament?",                            opts:["Aggressive — I attack from ball one","Defensive — I value patience and survival","Strategic — I read the game and adapt","Instinctive — I go with my gut feeling"] },
  { cat:"Your Personality",       q:"When you're under pressure during a match, what goes through your mind?",     opts:["I thrive — pressure brings out my best","I stay calm and focus on the process","I get nervous but push through it","I tend to overthink and it affects my game"] },
  { cat:"Your Personality",       q:"After a poor performance, how do you typically respond?",                     opts:["I analyze what went wrong and fix it immediately","I take some time to reset mentally, then come back stronger","I talk it through with teammates or a coach","It stays with me for a while — I need to work on bouncing back"] },
  { cat:"Goals & Dreams",         q:"What's your biggest cricket goal right now?",                                 opts:["Make it to a competitive team or academy","Improve specific skills (batting, bowling, fielding)","Build match fitness and consistency","Just enjoy the game and have fun"] },
  { cat:"Goals & Dreams",         q:"Where do you see your cricket in the next 2 years?",                         opts:["Playing at district or state level","Representing my club at a higher division","Becoming a well-rounded player","I'm not sure yet — I'm open to wherever this takes me"] },
  { cat:"Goals & Dreams",         q:"What does 'success' in cricket mean to you personally?",                     opts:["Winning trophies and titles","Consistently performing at my best","Being respected by teammates and opponents","Mastering the craft and loving every session"] },
  { cat:"Training Style",         q:"How often do you currently train or practice?",                              opts:["Almost every day — cricket is my life","3–5 times a week","1–2 times a week","Rarely — I want to start training more"] },
  { cat:"Training Style",         q:"What time of day works best for your training?",                             opts:["Early morning — I love the fresh start","Afternoon — when the energy is high","Evening — after school or work","I'm flexible — whenever I get a chance"] },
  { cat:"Training Style",         q:"Do you prefer training alone or with others?",                               opts:["Solo — I focus better on my own","With a partner — we push each other","In a group or team setting","A mix of everything depending on the session"] },
  { cat:"Training Style",         q:"How do you usually learn new skills?",                                       opts:["Watching videos and tutorials","Working directly with a coach","Trial and error during practice","Studying professional players and mimicking them"] },
  { cat:"Skills & Improvement",   q:"Which area of your game needs the most work right now?",                     opts:["Batting technique and shot selection","Bowling accuracy and variations","Fielding, catching, and ground work","Mental toughness and match awareness"] },
  { cat:"Skills & Improvement",   q:"As a batsman, which shot do you struggle with the most?",                    opts:["Playing short-pitched deliveries","Driving through the covers","Sweep and reverse sweep","Playing spin bowling confidently"] },
  { cat:"Skills & Improvement",   q:"What's your biggest strength on the cricket field?",                         opts:["Power hitting and big shots","Consistency and building innings","Reading the game and making smart decisions","Athleticism and energy in the field"] },
  { cat:"Mental Game",            q:"How important is the mental side of cricket to you?",                        opts:["Extremely — it's what separates good from great","Very important — I'm actively working on it","Somewhat — I know I should focus more on it","I haven't thought much about it yet"] },
  { cat:"Mental Game",            q:"Do you practice any form of mental preparation before a match?",             opts:["Yes — visualization, breathing, or meditation","I have a pre-match routine that helps me focus","Sometimes, but not consistently","No — I'd love to learn how"] },
  { cat:"Mental Game",            q:"How do you handle sledging or distractions on the field?",                   opts:["I stay completely focused — nothing gets to me","I use it as fuel to perform better","It bothers me sometimes but I manage","It really affects my concentration"] },
  { cat:"Fitness & Body",         q:"How would you rate your current fitness level?",                             opts:["Very fit — I train my body regularly","Decent — I can keep up but want to improve","Needs work — I get tired quickly on the field","I haven't focused on fitness yet"] },
  { cat:"Fitness & Body",         q:"Do you follow any specific fitness or diet plan for cricket?",               opts:["Yes — structured fitness and nutrition plan","I work out but don't follow a strict plan","I eat well but don't exercise specifically for cricket","Not yet — I'd like guidance on this"] },
  { cat:"Technology & Analysis",  q:"How comfortable are you with using technology in your training?",            opts:["Very — I already use apps, video analysis, and data","Somewhat — I'm open to learning more","Not much — but I'm curious about it","This is all new to me"] },
  { cat:"Technology & Analysis",  q:"Would you like SmartCrick AI to analyze your match videos?",                 opts:["Absolutely — that's exactly what I need","Yes, if it's easy to use","Maybe later, once I'm more comfortable","I'd prefer to focus on drills and practice plans first"] },
  { cat:"Coaching & Support",     q:"Do you currently work with a coach?",                                        opts:["Yes — I have a dedicated personal coach","I attend coaching sessions at a club or academy","I've had coaches before but not currently","I've never had formal coaching"] },
  { cat:"Coaching & Support",     q:"What kind of coaching style works best for you?",                            opts:["Structured and disciplined — tell me exactly what to do","Encouraging and supportive — build my confidence","Analytical — show me data and let me understand why","Flexible — adapt to how I'm feeling that day"] },
  { cat:"Inspiration",            q:"Which cricketing legend inspires you the most?",                             opts:["Virat Kohli — passion, aggression, and elite fitness","MS Dhoni — calm under pressure, the ultimate finisher","Sachin Tendulkar — mastery, dedication, and grace","Someone else — I have my own cricketing hero"] },
  { cat:"Inspiration",            q:"What motivates you to keep training even on tough days?",                    opts:["The dream of playing at the highest level","The love of the game — cricket is my passion","My teammates and the people who believe in me","Proving to myself that I can keep getting better"] },
  { cat:"Your SmartCrick Journey",q:"What feature of SmartCrick AI excites you the most?",                        opts:["AI-powered training plans personalized to me","Video analysis and performance tracking","Mental conditioning and match preparation","All of it — I want the complete experience"] },
  { cat:"Your SmartCrick Journey",q:"How often would you like SmartCrick AI to check in with you?",               opts:["Daily — keep me accountable every day","A few times a week — regular but not overwhelming","Weekly — a solid summary and plan each week","I'll check in when I feel like it"] },
  { cat:"Your SmartCrick Journey",q:"Last one — what word best describes the cricketer you want to become?",      opts:["Fearless","Consistent","Intelligent","Unstoppable"] }
];

const TOTAL  = Qs.length;
const LOGO   = "https://ucarecdn.com/524955bb-11c6-4b20-a6cf-974403ad7456/-/format/auto/";

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let phase   = "welcome";
let qi      = 0;
let answers = {};
let muted   = true;
let musicOn = false;
let busy    = false;   // blocks clicks during transition

/* ═══════════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════════ */
const bgm     = document.getElementById("bgm");
const muteBtn = document.getElementById("mute-btn");

function renderMuteIcon() {
  muteBtn.innerHTML = muted
    ? `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#3D7A5F" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`
    : `<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#3D7A5F" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
}

function playMusic() {
  if (musicOn) return;
  bgm.volume = 0.13;
  bgm.play().then(() => { musicOn = true; muted = false; renderMuteIcon(); }).catch(() => {});
}

muteBtn.addEventListener("click", () => {
  if (!musicOn) { playMusic(); return; }
  muted = !muted;
  bgm.muted = muted;
  renderMuteIcon();
});

/* ═══════════════════════════════════════════════
   TRANSITION ENGINE
═══════════════════════════════════════════════ */
const screen = document.getElementById("screen");

function go(renderFn) {
  if (busy) return;
  busy = true;
  screen.classList.remove("fade-in");
  screen.classList.add("fade-out");

  setTimeout(() => {
    screen.classList.remove("fade-out");
    renderFn();
    // force reflow
    void screen.offsetWidth;
    screen.classList.add("fade-in");
    setTimeout(() => { screen.classList.remove("fade-in"); busy = false; }, 720);
  }, 460);
}

/* ═══════════════════════════════════════════════
   SVG HELPERS
═══════════════════════════════════════════════ */
const CHK = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const ARRL= `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
const ARRR= `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

/* ═══════════════════════════════════════════════
   GREETING
═══════════════════════════════════════════════ */
function greet() {
  const h = new Date().getHours();
  if (h < 5)  return "Good night";
  if (h < 12) return "Good morning";
  if (h < 17) return "Good afternoon";
  if (h < 21) return "Good evening";
  return "Good night";
}

/* ═══════════════════════════════════════════════
   RENDER: WELCOME
═══════════════════════════════════════════════ */
function showWelcome() {
  screen.innerHTML = `
    <div class="welcome">
      <div class="logo-wrap">
        <img src="${LOGO}" alt="SmartCrick AI"/>
      </div>
      <p class="welcome-tag">${greet()}, Champ 👋</p>
      <h1 class="welcome-h1">Welcome to<br>SmartCrick AI</h1>
      <p class="welcome-p">
        We'll ask you a few thoughtful questions to build
        a cricket experience that's completely yours.
      </p>
      <button class="pill-btn" id="begin">
        Let's Begin &nbsp;${ARRR}
      </button>
    </div>`;

  document.getElementById("begin").addEventListener("click", () => {
    playMusic();
    phase = "quiz"; qi = 0;
    go(showQuiz);
  });
}

/* ═══════════════════════════════════════════════
   RENDER: QUIZ
═══════════════════════════════════════════════ */
function showQuiz() {
  const data     = Qs[qi];
  const pct      = ((qi + 1) / TOTAL * 100).toFixed(2);
  const picked   = answers[qi];

  const optsHtml = data.opts.map((o, i) => {
    const yes = picked === i;
    return `
      <button class="opt${yes ? " picked" : ""}" data-i="${i}">
        <span class="chk">${yes ? CHK : ""}</span>
        <span class="opt-label">${o}</span>
      </button>`;
  }).join("");

  screen.innerHTML = `
    <div class="quiz">
      <div class="prog-track">
        <div class="prog-fill" style="width:${pct}%"></div>
      </div>
      <div class="prog-meta">
        <span class="prog-cat">${data.cat}</span>
        <span class="prog-num">${qi + 1}&thinsp;/&thinsp;${TOTAL}</span>
      </div>
      <h2 class="q-text">${data.q}</h2>
      <div class="opts" id="opts">${optsHtml}</div>
      <button class="back-btn${qi === 0 ? " hidden" : ""}" id="back">
        ${ARRL} Back
      </button>
    </div>`;

  /* Option clicks */
  document.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", () => {
      if (busy) return;
      const i = parseInt(btn.dataset.i);

      /* Instant visual feedback */
      answers[qi] = i;
      document.querySelectorAll(".opt").forEach(b => {
        const yes = parseInt(b.dataset.i) === i;
        b.classList.toggle("picked", yes);
        b.querySelector(".chk").innerHTML = yes ? CHK : "";
        b.style.pointerEvents = "none";
      });
      const backEl = document.getElementById("back");
      if (backEl) backEl.style.pointerEvents = "none";

      /* 490ms beat → advance */
      setTimeout(() => {
        if (qi < TOTAL - 1) { qi++; go(showQuiz); }
        else                 { phase = "done"; go(showDone); }
      }, 490);
    });
  });

  /* Back */
  const backEl = document.getElementById("back");
  if (backEl && qi > 0) {
    backEl.addEventListener("click", () => {
      if (busy) return;
      qi--;
      go(showQuiz);
    });
  }
}

/* ═══════════════════════════════════════════════
   RENDER: DONE
═══════════════════════════════════════════════ */
function showDone() {
  screen.innerHTML = `
    <div class="done">
      <img class="done-logo" src="${LOGO}" alt="SmartCrick AI"/>
      <div class="done-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2 class="done-h2">You're all set,<br>Champ!</h2>
      <p class="done-body">
        We've built a personalized training experience just for you.
        Your SmartCrick AI journey starts right now.
      </p>
      <p class="done-hint">Ready to unlock the training app of your life?</p>
      <a href="https://smartcricai.base44.app" class="pill-btn" style="text-decoration:none;">
        Start Training &nbsp;${ARRR}
      </a>
    </div>`;
}

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
renderMuteIcon();
screen.classList.add("fade-in");
showWelcome();
setTimeout(() => screen.classList.remove("fade-in"), 720);
</script>
</body>
</html>
