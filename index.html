<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartCrick AI Onboarding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-hidden" style="background: linear-gradient(180deg, #FAFAF8 0%, #F0F5F3 50%, #E8F0EC 100%);">
  
  <audio id="bg-music" loop>
    <source src="quietphase-ambient-calm-491578.mp3" type="audio/mpeg">
  </audio>

  <button id="mute-btn" class="fixed top-5 right-5 z-50 w-12 h-12 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 cursor-pointer" style="background: rgba(180,210,200,0.35); backdrop-filter: blur(8px); border: 1px solid rgba(180,210,200,0.4);">
    <div id="speaker-icon"></div>
  </button>

  <div class="fixed w-96 h-96 rounded-full pointer-events-none float-orb-1" style="background: radial-gradient(circle, rgba(167,196,188,0.18) 0%, transparent 70%); top: -10%; right: -10%;"></div>
  <div class="fixed w-72 h-72 rounded-full pointer-events-none float-orb-2" style="background: radial-gradient(circle, rgba(107,144,128,0.12) 0%, transparent 70%); bottom: 5%; left: -5%;"></div>
  <div class="fixed w-52 h-52 rounded-full pointer-events-none float-orb-3" style="background: radial-gradient(circle, rgba(167,196,188,0.15) 0%, transparent 70%); top: 40%; left: 70%;"></div>

  <div id="app-container" class="flex-1 flex flex-col items-center justify-center relative px-6 w-full z-10 fade-in">
    </div>

  <div class="pb-8 text-center z-10 w-full absolute bottom-0">
    <span class="text-sm font-semibold tracking-wide" style="color: rgba(107,144,128,0.6);">SmartCrick AI — Train Like a Champion</span>
  </div>

  <script src="script.js"></script>
</body>
</html>
