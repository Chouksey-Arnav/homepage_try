<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SmartCrick AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7F5;--surface:rgba(255,255,255,0.94);
  --gd:#1D3D32;--gm:#2A5C46;--g:#376B55;
  --gs:#5F9A80;--gmi:#9FC4B0;--gg:#CEE5D8;
  --td:#162B22;--tb:#365549;--ts:#6E9E88;--tf:#A8C8B8;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --out:cubic-bezier(0.16,1,0.3,1);
  --ease:cubic-bezier(0.22,1,0.36,1);
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--td);-webkit-font-smoothing:antialiased;overflow:hidden}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.022;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}

/* VIDEO INTRO */
#intro-wrap{position:fixed;inset:0;z-index:200;background:#050e0a;transition:opacity 1.8s var(--ease)}
#intro-wrap.done{opacity:0;pointer-events:none}
#intro-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
#intro-vignette{position:absolute;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.65) 100%)}
#intro-overlay{position:absolute;bottom:0;left:0;right:0;z-index:3;display:flex;flex-direction:column;align-items:center;padding-bottom:80px;opacity:0;animation:fadeUp 1s var(--ease) 1.2s forwards}
#intro-overlay img{width:56px;height:56px;border-radius:16px;object-fit:contain;box-shadow:0 12px 40px rgba(0,0,0,0.55);margin-bottom:12px}
#intro-overlay .ib{font-size:clamp(1.4rem,4.5vw,2rem);font-weight:800;letter-spacing:-.02em;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,0.7);text-align:center}
#intro-overlay .it{font-size:.76rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(160,220,190,0.92);margin-top:6px;text-shadow:0 1px 10px rgba(0,0,0,0.5)}
#skip-btn{position:absolute;bottom:22px;right:22px;z-index:10;padding:9px 20px;border-radius:999px;border:1.5px solid rgba(95,154,128,0.42);background:rgba(5,14,10,0.68);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);color:rgba(95,154,128,0.94);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:background .2s,transform .2s;opacity:0;animation:fadeIn .5s ease-out 2.4s forwards}
#skip-btn:hover{background:rgba(55,107,85,0.32);transform:scale(1.04)}

/* ATMOSPHERE */
.pool{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(110px);will-change:transform}
.pa{width:650px;height:650px;top:-180px;right:-160px;background:radial-gradient(circle,rgba(80,170,120,.10) 0%,transparent 62%);animation:d1 30s ease-in-out infinite}
.pb{width:500px;height:500px;bottom:-120px;left:-120px;background:radial-gradient(circle,rgba(60,140,100,.08) 0%,transparent 62%);animation:d2 36s ease-in-out infinite}
.pc-bg{width:340px;height:340px;top:38%;left:54%;background:radial-gradient(circle,rgba(100,180,140,.06) 0%,transparent 62%);animation:d3 24s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0)}35%{transform:translate(22px,-32px)}70%{transform:translate(-16px,20px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}42%{transform:translate(-24px,-18px)}78%{transform:translate(14px,26px)}}
@keyframes d3{0%,100%{transform:translate(-50%,0)}52%{transform:translate(-50%,-16px)}}

/* MUTE */
#mute-btn{position:fixed;top:18px;right:18px;z-index:300;width:42px;height:42px;border-radius:50%;border:1.5px solid rgba(160,200,180,.38);background:rgba(255,255,255,.60);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 2px 16px rgba(30,65,50,.07);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .22s var(--spring),box-shadow .22s var(--out)}
#mute-btn:hover{transform:scale(1.12)}
#mute-btn:active{transform:scale(.90)}

/* STAGE */
#stage{position:relative;z-index:10;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;padding:18px 18px 32px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#stage::-webkit-scrollbar{display:none}
#screen{width:100%;max-width:460px;will-change:opacity,transform}
#screen.s-out{animation:sOut .36s cubic-bezier(0.4,0,1,1) forwards}
#screen.s-in{animation:sIn .88s var(--ease) forwards}
@keyframes sOut{0%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}100%{opacity:0;transform:translateY(-28px) scale(.96);filter:blur(10px)}}
@keyframes sIn{0%{opacity:0;transform:translateY(46px) scale(.97);filter:blur(10px)}36%{filter:blur(0)}72%{transform:translateY(-3px) scale(1.003)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}

/* STAGGER */
.pop{opacity:0;animation:popIn .70s var(--spring) forwards}
.p0{animation-delay:.04s}.p1{animation-delay:.15s}.p2{animation-delay:.27s}
.p3{animation-delay:.40s}.p4{animation-delay:.55s}.p5{animation-delay:.70s}.p6{animation-delay:.86s}
@keyframes popIn{0%{opacity:0;transform:translateY(22px) scale(.90);filter:blur(6px)}42%{opacity:1;filter:blur(0)}72%{transform:translateY(-3px) scale(1.005)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
.tag-pop{opacity:0;animation:tagPop .65s var(--ease) .20s forwards}
@keyframes tagPop{0%{opacity:0;letter-spacing:.25em;filter:blur(3px)}60%{opacity:1;filter:blur(0)}100%{opacity:1;letter-spacing:.17em}}

/* LOGO */
.logo-ring{position:relative;display:inline-block;animation:breathe 7s ease-in-out infinite;margin-bottom:12px}
.logo-ring::before{content:'';position:absolute;inset:-10px;border-radius:32px;background:radial-gradient(circle,rgba(80,170,120,.13) 0%,transparent 70%);animation:halo 7s ease-in-out infinite}
.logo-ring img{position:relative;display:block;width:62px;height:62px;border-radius:18px;object-fit:contain;box-shadow:0 12px 36px rgba(29,61,50,.15),0 3px 9px rgba(29,61,50,.09)}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.015)}}
@keyframes halo{0%,100%{opacity:.50;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}

/* WELCOME — compact, fits one screen */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center}

.w-quote-bar{width:100%;max-width:400px;margin-bottom:16px;padding:11px 16px 11px 18px;background:rgba(55,107,85,.056);border:1.5px solid rgba(55,107,85,.14);border-radius:15px;text-align:left;position:relative}
.w-quote-bar::before{content:'\201C';position:absolute;top:-7px;left:11px;font-size:2.2rem;line-height:1;font-weight:800;color:var(--gs);opacity:.26;font-family:Georgia,serif;pointer-events:none}
.w-quote-text{font-size:clamp(.76rem,2.1vw,.86rem);font-weight:400;font-style:italic;color:var(--tb);line-height:1.58;opacity:.92;padding-top:2px}
.w-quote-attr{display:block;margin-top:5px;font-size:.58rem;font-weight:700;font-style:normal;letter-spacing:.11em;text-transform:uppercase;color:var(--gs);opacity:.76}

.w-tag{font-size:.62rem;font-weight:700;letter-spacing:.17em;text-transform:uppercase;color:var(--gs);margin-bottom:7px}
.w-title{font-size:clamp(2.1rem,7.5vw,3.0rem);font-weight:800;line-height:1.04;letter-spacing:-.034em;color:var(--td);margin-bottom:5px}
.w-sub{font-size:clamp(.82rem,2.1vw,.90rem);font-weight:400;font-style:italic;color:var(--ts);line-height:1.58;opacity:.88;margin-bottom:18px}
.w-hint{font-size:.63rem;font-weight:500;color:var(--tf);margin-top:10px;letter-spacing:.04em;opacity:.76}

/* CTA */
.cta{display:inline-flex;align-items:center;gap:9px;padding:15px 40px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.96rem;font-weight:700;letter-spacing:.01em;color:#fff;text-decoration:none;background:linear-gradient(135deg,var(--gm) 0%,var(--g) 100%);box-shadow:0 10px 34px rgba(29,61,50,.22),0 3px 8px rgba(29,61,50,.12),inset 0 1px 0 rgba(255,255,255,.14);transition:transform .26s var(--spring),box-shadow .26s var(--out);position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.10) 0%,transparent 50%);pointer-events:none}
.cta:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 18px 46px rgba(29,61,50,.26),0 6px 14px rgba(29,61,50,.14)}
.cta:active{transform:scale(.956)}
.cta:disabled{opacity:.34;cursor:not-allowed;transform:none!important;box-shadow:none}

/* RESUME */
.resume-card{width:100%;max-width:380px;margin:2px auto 0;background:rgba(55,107,85,.06);border:1.5px solid rgba(55,107,85,.16);border-radius:17px;padding:14px 17px;text-align:center}
.resume-card p{font-size:.82rem;font-weight:500;color:var(--tb);margin-bottom:11px;line-height:1.5}
.resume-card strong{color:var(--td);font-weight:700}
.resume-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.btn-r{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.84rem;font-weight:700;color:#fff;background:var(--g);box-shadow:0 6px 18px rgba(29,61,50,.2);transition:transform .22s var(--spring)}
.btn-r:hover{transform:translateY(-2px) scale(1.04)}
.btn-f{display:inline-flex;align-items:center;gap:5px;padding:10px 14px;border-radius:999px;border:1.5px solid var(--gg);background:transparent;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;color:var(--ts);transition:background .2s,color .2s,transform .2s var(--spring)}
.btn-f:hover{background:rgba(160,200,180,.12);color:var(--tb)}

/* FORM */
.scr{display:flex;flex-direction:column;align-items:center;text-align:center}
.scr-q{font-size:clamp(1.7rem,6.8vw,2.55rem);font-weight:800;line-height:1.1;letter-spacing:-.028em;color:var(--td);margin-bottom:8px}
.scr-sub{font-size:.85rem;font-weight:400;font-style:italic;color:var(--ts);margin-bottom:24px;line-height:1.6}
.fblock{width:100%;max-width:360px;display:flex;flex-direction:column;gap:11px;margin-bottom:18px}
.fwrap{width:100%;text-align:left}
.flabel{display:block;font-size:.60rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gs);margin-bottom:6px;padding-left:3px}
.flabel span{font-weight:500;text-transform:none;letter-spacing:.04em;color:var(--tf);font-size:.60rem}
.finp{width:100%;padding:14px 17px;border-radius:14px;border:2px solid var(--gg);background:rgba(255,255,255,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:inherit;font-size:.95rem;font-weight:600;color:var(--td);outline:none;box-shadow:0 2px 10px rgba(29,61,50,.04);transition:border-color .24s var(--out),box-shadow .24s var(--out)}
.finp.single{text-align:center;font-size:1.06rem}
.finp::placeholder{color:var(--tf);font-weight:400;font-style:italic}
.finp:focus{border-color:var(--g);box-shadow:0 0 0 4px rgba(55,107,85,.10),0 4px 18px rgba(29,61,50,.08)}
.finp.err{border-color:#D06060;box-shadow:0 0 0 3px rgba(208,96,96,.10)}
.ferr{font-size:.67rem;font-weight:500;color:#B84040;margin-top:5px;padding-left:3px;display:none}
.ferr.show{display:block}

/* QUIZ */
.quiz{display:flex;flex-direction:column}
.pt{width:100%;height:3px;border-radius:999px;background:rgba(160,196,178,.2);overflow:hidden;margin-bottom:7px}
.pf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gmi),var(--g));transition:width 1.1s var(--out)}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pcat{font-size:.59rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gs)}
.pnum{font-size:.64rem;font-weight:500;color:var(--tf);letter-spacing:.04em}
.ph{font-size:.67rem;font-weight:700;font-style:italic;color:var(--gs);margin-bottom:18px}
.qh{font-size:clamp(1.35rem,5vw,2rem);font-weight:800;line-height:1.18;letter-spacing:-.020em;color:var(--td);margin-bottom:6px}
.qc{font-size:.74rem;font-weight:400;font-style:italic;color:var(--ts);margin-bottom:14px;line-height:1.5;opacity:.88}
.opts{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.opt{display:flex;align-items:center;gap:11px;width:100%;padding:13px 15px;border-radius:15px;background:var(--surface);border:1.5px solid rgba(206,229,216,.85);box-shadow:0 1px 7px rgba(29,61,50,.03);cursor:pointer;font-family:inherit;font-size:clamp(.78rem,2vw,.88rem);font-weight:500;color:var(--tb);text-align:left;line-height:1.44;-webkit-tap-highlight-color:transparent;transition:border-color .25s var(--out),box-shadow .25s var(--out),background .25s var(--out),transform .18s var(--spring),color .25s;position:relative;overflow:hidden;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.opt::after{content:'';position:absolute;top:0;left:0;right:0;height:46%;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.44) 0%,transparent 100%);pointer-events:none}
.opt:hover:not(.sel){border-color:var(--gg);box-shadow:0 4px 16px rgba(29,61,50,.08);transform:translateY(-1px);color:var(--td)}
.opt:active:not(.sel){transform:scale(.984)}
.opt.sel{border-color:var(--g);border-width:2px;background:linear-gradient(135deg,rgba(206,229,216,.55),rgba(232,242,236,.40));color:var(--td);box-shadow:0 5px 24px rgba(29,61,50,.10),0 0 0 4px rgba(55,107,85,.06);transform:scale(1.006)}
.ring{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1.5px solid rgba(160,196,178,.65);display:flex;align-items:center;justify-content:center;transition:border-color .22s var(--out),background .22s var(--out),transform .28s var(--spring);background:transparent}
.opt.sel .ring{border-color:var(--g);background:var(--g);transform:scale(1.16)}
.ring svg{display:none}.opt.sel .ring svg{display:block}
.opt-txt{flex:1}
.back{display:inline-flex;align-items:center;gap:5px;padding:7px 13px 7px 9px;border-radius:999px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;color:var(--tf);transition:color .2s,background .2s,transform .2s var(--spring)}
.back:hover{color:var(--ts);background:rgba(160,196,178,.11);transform:translateX(-2px)}
.back:active{transform:scale(.92)}
.back.hide{visibility:hidden;pointer-events:none}

/* DONE */
.done-halo{position:relative;margin-bottom:20px}
.done-halo::before{content:'';position:absolute;inset:-16px;border-radius:50%;background:radial-gradient(circle,rgba(80,170,120,.16) 0%,transparent 70%);animation:halo 4s ease-in-out infinite}
.done-circle{position:relative;width:70px;height:70px;border-radius:50%;background:linear-gradient(145deg,var(--gm),var(--g));display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(29,61,50,.26),0 3px 10px rgba(29,61,50,.14);animation:popIn .8s var(--spring) both}
.done-logo{width:42px;height:42px;border-radius:12px;object-fit:contain;margin-bottom:11px;opacity:.88;box-shadow:0 5px 16px rgba(29,61,50,.12)}
.done-h{font-size:clamp(1.65rem,6.5vw,2.6rem);font-weight:800;line-height:1.1;letter-spacing:-.028em;color:var(--td);margin-bottom:11px}
.done-p{font-size:clamp(.84rem,2.3vw,.94rem);font-weight:400;font-style:italic;color:var(--tb);line-height:1.72;max-width:310px;margin:0 auto 7px;opacity:.88}
.done-hint{font-size:.74rem;font-weight:500;color:var(--tf);margin-bottom:28px;line-height:1.6}
.save-msg{font-size:.66rem;font-weight:500;color:var(--gs);margin-top:11px;min-height:16px;letter-spacing:.02em;opacity:.85;transition:color .3s}

/* KEYFRAMES */
@keyframes fadeUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}

.wm{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:.52rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(95,154,128,.19);pointer-events:none;z-index:5;white-space:nowrap}

@media(max-width:420px){
  #stage{padding:14px 13px 28px}
  .w-title{font-size:clamp(1.9rem,7.5vw,2.5rem)}
  .qh{font-size:clamp(1.25rem,5vw,1.8rem)}
  .opts{gap:6px}
  .opt{padding:11px 12px;border-radius:13px}
}
</style>
</head>
<body>

<!-- VIDEO INTRO -->
<div id="intro-wrap">
  <video id="intro-video" autoplay playsinline preload="auto"
         onended="endIntro()" onerror="endIntro()">
    <source src="13d16477-6541-4a53-901f-61309ebe82d0_hd.mp4" type="video/mp4"/>
  </video>
  <div id="intro-vignette"></div>
  <div id="intro-overlay">
    <img src="https://ucarecdn.com/524955bb-11c6-4b20-a6cf-974403ad7456/-/format/auto/" alt="SmartCrick AI"/>
    <div class="ib">SmartCrick AI</div>
    <div class="it">Elite Cricket · Powered by AI</div>
  </div>
  <button id="skip-btn" onclick="skipIntro()">Skip intro</button>
</div>

<!-- BG POOLS -->
<div class="pool pa"></div>
<div class="pool pb"></div>
<div class="pool pc-bg"></div>

<!-- AMBIENT AUDIO -->
<audio id="bgm" loop preload="auto">
  <source src="quietphase-ambient-calm-491578.mp3" type="audio/mpeg"/>
</audio>

<!-- MUTE BUTTON -->
<button id="mute-btn" aria-label="Toggle music"></button>

<!-- MAIN STAGE -->
<div id="stage"><div id="screen"></div></div>
<div class="wm">SmartCrick AI &nbsp;·&nbsp; Train Like a Champion</div>

<script>
const SHEET_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

/* 50 daily-rotating quotes */
const QUOTES=[
  {q:"The will to win means nothing without the will to prepare.",a:"Des Williams"},
  {q:"Cricket is a game of glorious uncertainties.",a:"Neville Cardus"},
  {q:"You don't play cricket with your talent alone. You play it with your mind.",a:"Sunil Gavaskar"},
  {q:"The strongest steel is forged in the hottest fire.",a:"Cricket proverb"},
  {q:"Champions aren't born in gyms. They're born from something deep inside them.",a:"Muhammad Ali"},
  {q:"Every ball is the most important ball of your innings.",a:"Steve Waugh"},
  {q:"The harder the battle, the sweeter the victory.",a:"Les Brown"},
  {q:"Pressure is a privilege — it only comes to those who earn it.",a:"Billie Jean King"},
  {q:"In cricket, as in life, character is built through adversity.",a:"Rahul Dravid"},
  {q:"The man who drives himself further once the effort gets painful — that man will win.",a:"Roger Bannister"},
  {q:"Don't let the fear of failure keep you from playing the game.",a:"Babe Ruth"},
  {q:"Believe you can and you're halfway there.",a:"Theodore Roosevelt"},
  {q:"Excellence is not a destination; it is a continuous journey that never ends.",a:"Brian Tracy"},
  {q:"You have to dream before your dreams can come true.",a:"APJ Abdul Kalam"},
  {q:"Talent wins games, but teamwork and intelligence win championships.",a:"Michael Jordan"},
  {q:"The pain you feel today is the strength you feel tomorrow.",a:"Arnold Schwarzenegger"},
  {q:"Great players are made in the nets, not on match day.",a:"Geoffrey Boycott"},
  {q:"The best time to prepare for your next innings is right after your last one.",a:"Don Bradman"},
  {q:"When you're in form, everything looks easy. The hard part is getting there.",a:"Sachin Tendulkar"},
  {q:"Every setback is a setup for a comeback.",a:"Joel Osteen"},
  {q:"You can't put a limit on anything. The more you dream, the farther you get.",a:"Michael Phelps"},
  {q:"Success is the sum of small efforts, repeated day in and day out.",a:"Robert Collier"},
  {q:"Discipline is the bridge between goals and accomplishment.",a:"Jim Rohn"},
  {q:"Do not let what you cannot do interfere with what you can do.",a:"John Wooden"},
  {q:"A champion is defined not by their wins but by how they recover when they fall.",a:"Serena Williams"},
  {q:"Hard work beats talent when talent doesn't work hard.",a:"Tim Notke"},
  {q:"It's not whether you get knocked down; it's whether you get up.",a:"Vince Lombardi"},
  {q:"To give anything less than your best is to sacrifice the gift.",a:"Steve Prefontaine"},
  {q:"The mind is the athlete; the body is simply the means it uses.",a:"Bryce Courtenay"},
  {q:"If you fail to prepare, you prepare to fail.",a:"Benjamin Franklin"},
  {q:"Cricket is a team game — individual glory means nothing without collective sacrifice.",a:"Imran Khan"},
  {q:"The secret is to work less as individuals and more as a team.",a:"Richie Benaud"},
  {q:"Your struggles today are the foundation of your strength tomorrow.",a:"Unknown"},
  {q:"The biggest room in the world is the room for improvement.",a:"Helmut Schmidt"},
  {q:"Play every ball on its merit. That is the art of batting.",a:"Viv Richards"},

function getDailyQuote(){
  const d=new Date(), start=new Date(d.getFullYear(),0,0);
  return QUOTES[Math.floor((d-start)/864e5)%QUOTES.length];
}

/* Quiz data */
const Qs=[

  {cat:"Your Playing Identity",q:"Which batting style feels natural to you?",opts:["Right-handed batsman","Left-handed batsman","I'm comfortable with both","I'm still figuring it out"]},

  {cat:"Goals & Dreams",q:"What's your biggest cricket goal right now?",opts:["Make it to a competitive team or academy","Improve specific skills (batting, bowling, fielding)","Build match fitness and consistency","Just enjoy the game and have fun"]},
  {cat:"Goals & Dreams",q:"Where do you see your cricket in the next 2 years?",opts:["Playing at district or state level","Representing my club at a higher division","Becoming a well-rounded player","I'm open to wherever this takes me"]},

  {cat:"Training Style",q:"How do you usually learn new skills?",opts:["Watching videos and tutorials","Working directly with a coach","Trial and error during practice","Studying pros and mimicking them"]},
  {cat:"Skills & Improvement",q:"Which area of your game needs the most work?",opts:["Batting technique and shot selection","Bowling accuracy and variations","Fielding, catching, and ground work","Mental toughness and match awareness"]},
  {cat:"Skills & Improvement",q:"As a batsman, which shot do you struggle with most?",opts:["Playing short-pitched deliveries","Driving through the covers","Sweep and reverse sweep","Playing spin bowling confidently"]},
  {cat:"Skills & Improvement",q:"What's your biggest strength on the cricket field?",opts:["Power hitting and big shots","Consistency and building innings","Reading the game and making smart decisions","Athleticism and energy in the field"]},
  {cat:"Mental Game",q:"How important is the mental side of cricket to you?",opts:["Extremely — it's what separates good from great","Very important — I'm actively working on it","Somewhat — I know I should focus more on it","I haven't thought much about it yet"]},
  {cat:"Mental Game",q:"Do you practice any mental preparation before a match?",opts:["Yes — visualisation, breathing, or meditation","I have a pre-match routine that helps me focus","Sometimes, but not consistently","No — I'd love to learn how"]},
  {cat:"Mental Game",q:"How do you handle sledging or distractions on the field?",opts:["I stay completely focused — nothing gets to me","I use it as fuel to perform better","It bothers me sometimes but I manage","It really affects my concentration"]},
  {cat:"Fitness & Body",q:"How would you rate your current fitness level?",opts:["Very fit — I train my body regularly","Decent — I can keep up but want to improve","Needs work — I get tired quickly on the field","I haven't focused on fitness yet"]},
  {cat:"Fitness & Body",q:"Do you follow any specific fitness or diet plan for cricket?",opts:["Yes — structured fitness and nutrition plan","I work out but don't follow a strict plan","I eat well but don't exercise specifically for cricket","Not yet — I'd like guidance on this"]},
  {cat:"Technology & Analysis",q:"How comfortable are you using technology in your training?",opts:["Very — I already use apps, video analysis, and data","Somewhat — I'm open to learning more","Not much — but I'm curious about it","This is all new to me"]},
  {cat:"Technology & Analysis",q:"Would you like SmartCrick AI to analyse your match videos?",opts:["Absolutely — that's exactly what I need","Yes, if it's easy to use","Maybe later, once I'm more comfortable","I'd prefer to focus on drills and practice plans first"]},
  {cat:"Coaching & Support",q:"Do you currently work with a coach?",opts:["Yes — I have a dedicated personal coach","I attend coaching sessions at a club or academy","I've had coaches before but not currently","I've never had formal coaching"]},
  {cat:"Coaching & Support",q:"What kind of coaching style works best for you?",opts:["Structured and disciplined — tell me exactly what to do","Encouraging and supportive — build my confidence","Analytical — show me data and let me understand why","Flexible — adapt to how I'm feeling that day"]},
  {cat:"Inspiration",q:"Which cricketing legend inspires you most?",opts:["Virat Kohli — passion, aggression, and elite fitness","MS Dhoni — calm under pressure, the ultimate finisher","Sachin Tendulkar — mastery, dedication, and grace","Someone else — I have my own cricketing hero"]},
  {cat:"Inspiration",q:"What motivates you to keep training even on tough days?",opts:["The dream of playing at the highest level","The love of the game — cricket is my passion","My teammates and the people who believe in me","Proving to myself that I can keep getting better"]},
  {cat:"Your SmartCrick Journey",q:"What feature of SmartCrick AI excites you most?",opts:["AI-powered training plans personalised to me","Video analysis and performance tracking","Mental conditioning and match preparation","All of it — I want the complete experience"]},
  {cat:"Your SmartCrick Journey",q:"How often would you like SmartCrick AI to check in with you?",opts:["Daily — keep me accountable every day","A few times a week — regular but not overwhelming","Weekly — a solid summary and plan each week","I'll check in when I feel like it"]},
  {cat:"Your SmartCrick Journey",q:"Last one — what word best describes the cricketer you want to become?",opts:["Fearless","Consistent","Intelligent","Unstoppable"]},
];
const CTX={
  "Getting to Know You":"Every champion has a unique story. Yours starts here.",
  "Your Playing Identity":"Your style on the pitch is your signature. Help us understand you.",
  "Your Personality":"Cricket is 90% mental. How do you think and feel on the field?",
  "Goals & Dreams":"The clearest vision creates the sharpest focus.",
  "Training Style":"The right training approach changes everything.",
  "Skills & Improvement":"Elite players always know exactly what to sharpen.",
  "Mental Game":"Champions are built in the mind before they step onto the field.",
  "Fitness & Body":"Your body is your most important piece of equipment.",
  "Technology & Analysis":"Data-driven players have an unfair advantage.",
  "Coaching & Support":"The best players in the world are always coachable.",
  "Inspiration":"Who you look up to shapes who you become.",
  "Your SmartCrick Journey":"Almost there — let's make this journey perfect for you.",
};
const TOTAL=Qs.length;
const LOGO="https://ucarecdn.com/524955bb-11c6-4b20-a6cf-974403ad7456/-/format/auto/";
const SK="smartcrick_v5";

let qi=0,answers={},userName="",userEmail="",userPhone="";
let muted=false,playing=false,busy=false;

function saveP(){try{localStorage.setItem(SK,JSON.stringify({userName,userEmail,userPhone,qi,answers}))}catch(e){}}
function loadP(){try{const d=JSON.parse(localStorage.getItem(SK)||"null");if(d&&d.userName){userName=d.userName;userEmail=d.userEmail||"";userPhone=d.userPhone||"";qi=d.qi||0;answers=d.answers||{};return true}}catch(e){}return false}
function clearP(){try{localStorage.removeItem(SK)}catch(e){}}

/* Audio */
const bgm=document.getElementById("bgm"),mBtn=document.getElementById("mute-btn");
function setIcon(){mBtn.innerHTML=muted?`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#376B55" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`:`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#376B55" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`}
function startAudio(){
  if(playing)return;
  bgm.volume=0.10;
  bgm.play().then(()=>{playing=true;muted=false;setIcon()}).catch(()=>{
    muted=true;setIcon();
    const u=()=>{bgm.volume=0.10;bgm.play().then(()=>{playing=true;muted=false;setIcon()}).catch(()=>{});document.removeEventListener("pointerdown",u)};
    document.addEventListener("pointerdown",u,{once:true});
  });
}
mBtn.addEventListener("click",()=>{
  if(!playing){bgm.volume=0.10;bgm.play().then(()=>{playing=true;muted=false;setIcon()}).catch(()=>{});return}
  muted=!muted;bgm.muted=muted;setIcon();
});

/* Transitions */
const sc=document.getElementById("screen");
function goTo(fn){
  if(busy)return;busy=true;
  sc.classList.remove("s-in");sc.classList.add("s-out");
  setTimeout(()=>{
    sc.classList.remove("s-out");fn();
    void sc.offsetWidth;
    sc.classList.add("s-in");
    setTimeout(()=>{sc.classList.remove("s-in");busy=false},1100);
  },370);
}

const CHK=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const IB=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
const AR=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

/* Video intro */
let introActive=true;
function endIntro(){
  if(!introActive)return;
  introActive=false;
  startAudio();
  const wrap=document.getElementById("intro-wrap");
  if(wrap){wrap.classList.add("done");setTimeout(()=>wrap.remove(),2000);}
}
function skipIntro(){
  const v=document.getElementById("intro-video");
  if(v)v.pause();
  endIntro();
}

/* WELCOME */
function showWelcome(){
  const has=loadP(), dq=getDailyQuote();
  sc.innerHTML=`
    <div class="welcome">
      <div class="w-quote-bar p0 pop">
        <p class="w-quote-text">&ldquo;${dq.q}&rdquo;</p>
        <span class="w-quote-attr">&mdash;&thinsp;${dq.a}</span>
      </div>
      <div class="p1 pop"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <p class="w-tag tag-pop">AI-Powered &nbsp;·&nbsp; Elite Cricket Training</p>
      <h1 class="w-title p2 pop">Welcome to<br>SmartCrick AI</h1>
      <p class="w-sub p3 pop">Your journey to greatness starts right here.</p>
      ${has&&qi>0?`
        <div class="resume-card p4 pop">
          <p>Welcome back, <strong>${userName}</strong>! You're on question <strong>${qi+1}\u202F/\u202F${TOTAL}</strong>.</p>
          <div class="resume-btns">
            <button class="btn-r" id="bc">Continue ${AR}</button>
            <button class="btn-f" id="bf">Start fresh</button>
          </div>
        </div>
      `:`
        <div class="p4 pop">
          <button class="cta" id="bg">Begin My Journey &nbsp;${AR}</button>
        </div>
        <p class="w-hint p5 pop">Takes about 3 minutes &nbsp;·&nbsp; Free to use</p>
      `}
    </div>`;
  document.getElementById("bg")?.addEventListener("click",()=>{if(!busy){clearP();qi=0;answers={};userName="";userEmail="";userPhone="";goTo(showName);}});
  document.getElementById("bc")?.addEventListener("click",()=>{if(!busy)goTo(showQuiz);});
  document.getElementById("bf")?.addEventListener("click",()=>{if(!busy){clearP();qi=0;answers={};userName="";userEmail="";userPhone="";goTo(showName);}});
}

/* NAME */
function showName(){
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <h2 class="scr-q p1 pop">What should we<br>call you, Champ?</h2>
      <p class="scr-sub p2 pop">We'll personalise everything just for you.</p>
      <div class="p3 pop" style="width:100%;max-width:360px;margin-bottom:18px">
        <input class="finp single" id="nf" type="text" placeholder="Your first name…"
          autocomplete="given-name" autocorrect="off" spellcheck="false" maxlength="40" value="${userName}"/>
      </div>
      <div class="p4 pop">
        <button class="cta" id="ng" ${userName?"":"disabled"}>Continue &nbsp;${AR}</button>
      </div>
    </div>`;
  const inp=document.getElementById("nf"),btn=document.getElementById("ng");
  inp.addEventListener("input",()=>{btn.disabled=inp.value.trim().length===0});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!btn.disabled)btn.click()});
  btn.addEventListener("click",()=>{const v=inp.value.trim();if(!v)return;userName=v;saveP();goTo(showContact)});
  setTimeout(()=>inp.focus(),900);
}

/* CONTACT */
function showContact(){
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <h2 class="scr-q p1 pop">Stay in touch,<br>${userName}.</h2>
      <p class="scr-sub p2 pop">How should SmartCrick AI reach you?</p>
      <div class="fblock p3 pop">
        <div class="fwrap">
          <label class="flabel" for="fe">Email address <span>· required</span></label>
          <input class="finp" id="fe" type="email" placeholder="you@example.com" value="${userEmail}"
            autocomplete="email" autocorrect="off" spellcheck="false" maxlength="120"/>
          <p class="ferr" id="ee">Please enter a valid email address.</p>
        </div>
        <div class="fwrap">
          <label class="flabel" for="fp">Phone number <span>· optional</span></label>
          <input class="finp" id="fp" type="tel" placeholder="+1 234 567 8900" value="${userPhone}"
            autocomplete="tel" autocorrect="off" spellcheck="false" maxlength="20"/>
        </div>
      </div>
      <div class="p4 pop">
        <button class="cta" id="cg" ${userEmail?"":"disabled"}>Continue &nbsp;${AR}</button>
      </div>
      <div class="p5 pop" style="margin-top:9px">
        <button class="back" id="cbk">${IB} Back</button>
      </div>
    </div>`;
  const ei=document.getElementById("fe"),pi=document.getElementById("fp"),
        bt=document.getElementById("cg"),er=document.getElementById("ee");
  const ok=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  ei.addEventListener("input",()=>{er.classList.remove("show");ei.classList.remove("err");bt.disabled=ei.value.trim().length===0});
  ei.addEventListener("keydown",e=>{if(e.key==="Enter")pi.focus()});
  pi.addEventListener("keydown",e=>{if(e.key==="Enter"&&!bt.disabled)bt.click()});
  bt.addEventListener("click",()=>{const v=ei.value.trim();if(!ok(v)){ei.classList.add("err");er.classList.add("show");ei.focus();return}userEmail=v;userPhone=pi.value.trim();saveP();goTo(showQuiz)});
  document.getElementById("cbk").addEventListener("click",()=>{if(!busy)goTo(showName)});
  setTimeout(()=>{if(!userEmail)ei.focus()},900);
}

/* QUIZ */
function showQuiz(){
  const d=Qs[qi],pct=((qi+1)/TOTAL*100).toFixed(1),sel=answers[qi],ctx=CTX[d.cat]||"";
  sc.innerHTML=`
    <div class="quiz">
      <div class="p0 pop">
        <div class="pt"><div class="pf" style="width:${pct}%"></div></div>
        <div class="pr"><span class="pcat">${d.cat}</span><span class="pnum">${qi+1}\u202F/\u202F${TOTAL}</span></div>
        <p class="ph">For you, ${userName} \u2193</p>
      </div>
      <h2 class="qh p1 pop">${d.q}</h2>
      <p class="qc p2 pop">${ctx}</p>
      <div class="opts p3 pop">
        ${d.opts.map(o=>`
          <button class="opt${sel===o?" sel":""}" data-txt="${o.replace(/"/g,"&quot;")}">
            <span class="ring">${sel===o?CHK:""}</span>
            <span class="opt-txt">${o}</span>
          </button>`).join("")}
      </div>
      <div class="p4 pop">
        <button class="back${qi===0?" hide":""}" id="bk">${IB} Back</button>
      </div>
    </div>`;
  sc.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(busy)return;
      const txt=btn.dataset.txt;
      answers[qi]=txt;saveP();
      sc.querySelectorAll(".opt").forEach(b=>{
        const y=b.dataset.txt===txt;
        b.classList.toggle("sel",y);
        b.querySelector(".ring").innerHTML=y?CHK:"";
        b.style.pointerEvents="none";
      });
      document.getElementById("bk").style.pointerEvents="none";
      setTimeout(()=>{
        if(qi<TOTAL-1){qi++;saveP();goTo(showQuiz);}
        else goTo(showDone);
      },340);
    });
  });
  document.getElementById("bk")?.addEventListener("click",()=>{
    if(!busy){if(qi===0)goTo(showContact);else{qi--;goTo(showQuiz);}}
  });
}

/* DONE */
function showDone(){
  clearP();
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><img class="done-logo" src="${LOGO}" alt="SmartCrick AI"/></div>
      <div class="done-halo p1 pop"><div class="done-circle">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div></div>
      <h2 class="done-h p2 pop">You're all set,<br>${userName}!</h2>
      <p class="done-p p3 pop">Your personalised cricket journey has been crafted.<br>SmartCrick AI is ready when you are.</p>
      <p class="done-hint p4 pop">Step onto the field. The best version of you awaits.</p>
      <div class="p5 pop"><a href="https://smartcricai.base44.app" class="cta">Start Training &nbsp;${AR}</a></div>
      <p class="save-msg p6 pop" id="sm">Saving your responses\u2026</p>
    </div>`;
  submitToSheets();
}

function submitToSheets(){
  const m=document.getElementById("sm");
  if(!SHEET_URL||SHEET_URL==="PASTE_YOUR_APPS_SCRIPT_URL_HERE"){if(m)m.textContent="";return}
  fetch(SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:userName,email:userEmail,phone:userPhone||"—",questions:Qs.map(q=>q.q),answers:Qs.map((_,i)=>answers[i]||"")})
  }).then(()=>{if(m){m.textContent="✓ Responses saved";m.style.color="var(--gs)"}})
    .catch(()=>{if(m){m.textContent="⚠ Could not save";m.style.color="var(--tf)"}});
}

/* BOOT */
setIcon();
showWelcome();
</script>
