<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SmartCrick AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ════════════════════════════════════════════
   RESET & ROOT
════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7F5; --surface:rgba(255,255,255,0.93);
  --green-deep:#1D3D32; --green-mid:#2A5C46; --green:#376B55;
  --green-soft:#5F9A80; --green-mist:#9FC4B0; --green-ghost:#CEE5D8;
  --text-deep:#162B22; --text-body:#365549; --text-soft:#6E9E88; --text-faint:#A8C8B8;
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in:     cubic-bezier(0.4, 0, 1, 1);
}
html,body{
  height:100%; font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg); color:var(--text-deep);
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
  overflow:hidden;
}
/* grain overlay */
body::after{
  content:''; position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* ════════════════════════════════════════════
   BACKGROUND POOLS
════════════════════════════════════════════ */
.pool{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(110px);will-change:transform}
.p1{width:680px;height:680px;top:-200px;right:-180px;background:radial-gradient(circle,rgba(80,170,120,0.12) 0%,transparent 62%);animation:d1 30s ease-in-out infinite}
.p2{width:520px;height:520px;bottom:-140px;left:-140px;background:radial-gradient(circle,rgba(60,140,100,0.09) 0%,transparent 62%);animation:d2 36s ease-in-out infinite}
.p3{width:360px;height:360px;top:38%;left:52%;background:radial-gradient(circle,rgba(100,180,140,0.08) 0%,transparent 62%);animation:d3 24s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0)}35%{transform:translate(24px,-36px)}70%{transform:translate(-18px,22px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}42%{transform:translate(-26px,-20px)}78%{transform:translate(16px,28px)}}
@keyframes d3{0%,100%{transform:translate(-50%,0)}52%{transform:translate(-50%,-18px)}}

/* ════════════════════════════════════════════
   MUTE BUTTON
════════════════════════════════════════════ */
#mute-btn{
  position:fixed;top:20px;right:20px;z-index:300;
  width:44px;height:44px;border-radius:50%;
  border:1.5px solid rgba(160,200,180,0.4);
  background:rgba(255,255,255,0.62);
  backdrop-filter:blur(18px) saturate(1.5);
  -webkit-backdrop-filter:blur(18px) saturate(1.5);
  box-shadow:0 2px 18px rgba(30,65,50,0.07);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .22s var(--ease-spring),box-shadow .22s var(--ease-out),background .22s;
}
#mute-btn:hover{transform:scale(1.13);box-shadow:0 6px 26px rgba(30,65,50,0.12);background:rgba(255,255,255,0.84)}
#mute-btn:active{transform:scale(0.90)}

/* ════════════════════════════════════════════
   STAGE
════════════════════════════════════════════ */
#stage{
  position:relative;z-index:10;width:100%;height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:28px 22px 46px;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
#stage::-webkit-scrollbar{display:none}
#screen{width:100%;max-width:500px;will-change:opacity,transform}

/* ════════════════════════════════════════════
   SCREEN TRANSITIONS  (bigger, meditative)
════════════════════════════════════════════ */
#screen.s-out{animation:sOut .40s var(--ease-in) forwards}
#screen.s-in {animation:sIn  1.5s var(--ease-out) forwards}
@keyframes sOut{
  0%  {opacity:1;transform:translateY(0) scale(1);     filter:blur(0px)}
  100%{opacity:0;transform:translateY(-26px) scale(0.972);filter:blur(6px)}
}
@keyframes sIn{
  0%  {opacity:0;transform:translateY(52px) scale(0.974);filter:blur(9px)}
  25% {filter:blur(0px)}
  100%{opacity:1;transform:translateY(0) scale(1);     filter:blur(0px)}
}

/* ════════════════════════════════════════════
   TIIMO POP-IN  (staggered spring per element)
════════════════════════════════════════════ */
.pop{opacity:0;animation:popIn .62s var(--ease-spring) forwards}
.pop0{animation-delay:.08s}
.pop1{animation-delay:.20s}
.pop2{animation-delay:.33s}
.pop3{animation-delay:.48s}
.pop4{animation-delay:.64s}
.pop5{animation-delay:.80s}
.pop6{animation-delay:.96s}
@keyframes popIn{
  0%  {opacity:0;transform:translateY(18px) scale(0.88)}
  60% {opacity:1}
  100%{opacity:1;transform:translateY(0) scale(1)}
}

/* ════════════════════════════════════════════
   LOGO RING (shared)
════════════════════════════════════════════ */
.logo-ring{position:relative;display:inline-block;animation:breathe 7s ease-in-out infinite;margin-bottom:22px}
.logo-ring::before{
  content:'';position:absolute;inset:-12px;border-radius:38px;
  background:radial-gradient(circle,rgba(80,170,120,0.15) 0%,transparent 70%);
  animation:halo 7s ease-in-out infinite;
}
.logo-ring img{
  position:relative;display:block;width:80px;height:80px;border-radius:22px;
  object-fit:contain;
  box-shadow:0 16px 44px rgba(29,61,50,0.16),0 4px 12px rgba(29,61,50,0.09);
}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.018)}}
@keyframes halo{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.09)}}

/* ════════════════════════════════════════════
   CTA BUTTON (shared)
════════════════════════════════════════════ */
.cta{
  display:inline-flex;align-items:center;gap:10px;
  padding:17px 46px;border-radius:999px;border:none;cursor:pointer;
  font-family:inherit;font-size:1rem;font-weight:700;letter-spacing:.01em;
  color:#fff;text-decoration:none;
  background:linear-gradient(135deg,var(--green-mid) 0%,var(--green) 100%);
  box-shadow:0 10px 38px rgba(29,61,50,0.22),0 3px 9px rgba(29,61,50,0.12),inset 0 1px 0 rgba(255,255,255,0.14);
  transition:transform .26s var(--ease-spring),box-shadow .26s var(--ease-out);
  position:relative;overflow:hidden;
}
.cta::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 50%);pointer-events:none}
.cta:hover{transform:translateY(-3px) scale(1.045);box-shadow:0 18px 50px rgba(29,61,50,0.26),0 6px 16px rgba(29,61,50,0.14)}
.cta:active{transform:scale(0.955)}
.cta:disabled{opacity:.36;cursor:not-allowed;transform:none!important;box-shadow:none}

/* ════════════════════════════════════════════
   WELCOME
════════════════════════════════════════════ */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:4px}
.w-tag  {font-size:.7rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--green-soft);margin-bottom:11px}
.w-title{font-size:clamp(2.3rem,9vw,3.4rem);font-weight:800;line-height:1.07;letter-spacing:-.034em;color:var(--text-deep);margin-bottom:13px}
.w-sub  {font-size:clamp(.9rem,2.5vw,.98rem);font-weight:400;font-style:italic;color:var(--text-body);line-height:1.72;max-width:310px;margin-bottom:0;opacity:.84}

/* continue card */
.resume-card{
  width:100%;max-width:370px;margin:18px auto 0;
  background:rgba(55,107,85,.07);border:1.5px solid rgba(55,107,85,.18);
  border-radius:18px;padding:16px 20px;text-align:center;
}
.resume-card p{font-size:.86rem;font-weight:500;color:var(--text-body);margin-bottom:13px;line-height:1.5}
.resume-card strong{color:var(--text-deep);font-weight:700}
.resume-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-res{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 26px;border-radius:999px;border:none;cursor:pointer;
  font-family:inherit;font-size:.88rem;font-weight:700;color:#fff;
  background:var(--green);box-shadow:0 6px 22px rgba(29,61,50,0.2);
  transition:transform .22s var(--ease-spring),box-shadow .22s;
}
.btn-res:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 10px 30px rgba(29,61,50,0.26)}
.btn-frsh{
  display:inline-flex;align-items:center;gap:6px;
  padding:11px 18px;border-radius:999px;
  border:1.5px solid var(--green-ghost);background:transparent;cursor:pointer;
  font-family:inherit;font-size:.86rem;font-weight:600;color:var(--text-soft);
  transition:background .2s,color .2s,transform .2s var(--ease-spring);
}
.btn-frsh:hover{background:rgba(160,200,180,.14);color:var(--text-body);transform:scale(1.02)}

/* ════════════════════════════════════════════
   CRICKET ANIMATION SCENE
════════════════════════════════════════════ */
.scene-wrap{
  width:100%;max-width:490px;margin:18px auto 0;
  border-radius:18px;overflow:visible;position:relative;
}
.cricket-svg{width:100%;height:auto;display:block;overflow:visible}

/* ── BOWLER GROUP: runs right→left ── */
.bowler-grp{animation:bowlerRun 5.6s linear infinite}
@keyframes bowlerRun{
  0%       {transform:translateX(105px)}   /* start: off right */
  28%      {transform:translateX(0px);animation-timing-function:cubic-bezier(0.4,0,0.2,1)}
  85%      {transform:translateX(0px)}
  86%      {transform:translateX(105px)}   /* instant reset */
  100%     {transform:translateX(105px)}
}

/* ── BOWLER BACK LEG (strides) ── */
.bowler-leg-b{
  transform-origin:375px 113px;
  animation:legBack 5.6s ease-in-out infinite;
}
@keyframes legBack{
  0%       {transform:rotate(-28deg)}
  3.5%     {transform:rotate(24deg)}
  7%       {transform:rotate(-28deg)}
  10.5%    {transform:rotate(24deg)}
  14%      {transform:rotate(-28deg)}
  17.5%    {transform:rotate(24deg)}
  21%      {transform:rotate(-28deg)}
  24.5%    {transform:rotate(24deg)}
  /* delivery stride — front foot plants */
  29%      {transform:rotate(42deg)}
  36%      {transform:rotate(38deg)}
  85%      {transform:rotate(38deg)}
  86%,100% {transform:rotate(-28deg)}
}
/* ── BOWLER FRONT LEG ── */
.bowler-leg-f{
  transform-origin:375px 113px;
  animation:legFront 5.6s ease-in-out infinite;
}
@keyframes legFront{
  0%       {transform:rotate(24deg)}
  3.5%     {transform:rotate(-28deg)}
  7%       {transform:rotate(24deg)}
  10.5%    {transform:rotate(-28deg)}
  14%      {transform:rotate(24deg)}
  17.5%    {transform:rotate(-28deg)}
  21%      {transform:rotate(24deg)}
  24.5%    {transform:rotate(-28deg)}
  29%      {transform:rotate(-50deg)}
  36%      {transform:rotate(-48deg)}
  85%      {transform:rotate(-48deg)}
  86%,100% {transform:rotate(24deg)}
}

/* ── BOWLING ARM: full circle delivery ── */
.bowl-arm{
  transform-origin:373px 96px;
  animation:bowlArm 5.6s ease-in-out infinite;
}
@keyframes bowlArm{
  /* run-up: small pump */
  0%       {transform:rotate(0deg);animation-timing-function:ease-in-out}
  3.5%     {transform:rotate(18deg)}
  7%       {transform:rotate(-14deg)}
  10.5%    {transform:rotate(18deg)}
  14%      {transform:rotate(-14deg)}
  17.5%    {transform:rotate(18deg)}
  21%      {transform:rotate(-14deg)}
  24.5%    {transform:rotate(18deg)}
  /* LOAD UP — arm sweeps back */
  28%      {transform:rotate(-90deg);animation-timing-function:cubic-bezier(0.2,0,0.05,1)}
  /* DELIVERY — explosive sweep over the top */
  36%      {transform:rotate(110deg)}
  /* FOLLOW THROUGH */
  50%,84%  {transform:rotate(130deg);animation-timing-function:ease-in-out}
  /* RESET */
  86%,100% {transform:rotate(0deg)}
}

/* ── BOWLING ARM FOREARM / WRIST ── */
.bowl-forearm{
  transform-origin:373px 75px;
  animation:bowlForearm 5.6s ease-in-out infinite;
}
@keyframes bowlForearm{
  0%,26%   {transform:rotate(0deg)}
  34%      {transform:rotate(-18deg)}
  38%      {transform:rotate(8deg)}
  52%,84%  {transform:rotate(8deg)}
  86%,100% {transform:rotate(0deg)}
}

/* ── BATSMAN BAT ARM ── */
.bat-arm{
  transform-origin:126px 97px;
  animation:batSwing 5.6s ease-in-out infinite;
}
@keyframes batSwing{
  0%,30%   {transform:rotate(32deg)}  /* back-lift, waiting */
  /* impact moment aligns with ball arrival ~36-38% */
  37%      {transform:rotate(32deg);animation-timing-function:cubic-bezier(0.12,0,0.1,1)}
  41%      {transform:rotate(-115deg)} /* explosive swing */
  46%,84%  {transform:rotate(-120deg)} /* follow-through high */
  85%,100% {transform:rotate(32deg)}   /* reset to back-lift */
}

/* ── DELIVERY BALL: bowler→pitch→bat ── */
.ball-del{
  animation:ballDel 5.6s ease-in-out infinite;
}
@keyframes ballDel{
  0%,30%   {transform:translate(0px,0px);opacity:0}
  31%      {opacity:1}
  /* pitches */
  34%      {transform:translate(-140px,32px);opacity:1;animation-timing-function:cubic-bezier(0.25,0.46,0.45,0.94)}
  /* rises to bat */
  38%      {transform:translate(-250px,-2px);opacity:1}
  39.5%    {transform:translate(-252px,-2px);opacity:0}
  100%     {transform:translate(-252px,-2px);opacity:0}
}

/* ── FLIGHT BALL: post-hit arc ── */
.ball-fly{
  animation:ballFly 5.6s ease-out infinite;
}
@keyframes ballFly{
  0%,40%   {transform:translate(0px,0px);opacity:0}
  41%      {opacity:1;animation-timing-function:cubic-bezier(0.2,0.9,0.4,1)}
  52%      {transform:translate(90px,-64px);opacity:1}
  64%      {transform:translate(200px,-96px);opacity:1}
  75%      {transform:translate(310px,-78px);opacity:.85}
  83%      {transform:translate(375px,-52px);opacity:.5}
  88%      {transform:translate(400px,-38px);opacity:0}
  100%     {transform:translate(400px,-38px);opacity:0}
}

/* ── TRAIL DOTS ── */
.tr{animation:trailFade 5.6s ease-in-out infinite}
.tr1{animation-delay:.06s}.tr2{animation-delay:.13s}.tr3{animation-delay:.20s}.tr4{animation-delay:.27s}.tr5{animation-delay:.34s}
@keyframes trailFade{
  0%,44%   {opacity:0}
  55%      {opacity:.72}
  72%      {opacity:.4}
  84%,100% {opacity:0}
}

/* ── IMPACT FLASH ── */
.impact{transform-origin:125px 98px;animation:impactFlash 5.6s ease-in-out infinite}
@keyframes impactFlash{
  0%,38%   {opacity:0;transform:scale(.3)}
  40%      {opacity:1;transform:scale(1)}
  44%      {opacity:0;transform:scale(1.8)}
  100%     {opacity:0}
}

/* ── SIX! ── */
.six{animation:sixAnim 5.6s ease-in-out infinite}
@keyframes sixAnim{
  0%,46%   {opacity:0;transform:scale(.4) translateY(6px)}
  56%      {opacity:1;transform:scale(1) translateY(0)}
  76%      {opacity:.8}
  84%,100% {opacity:0;transform:scale(1.05) translateY(-4px)}
}

/* ── GROUND ATMOSPHERE ── */
.ground-shadow{animation:gShadow 5.6s ease-in-out infinite}
@keyframes gShadow{0%,100%{opacity:.5}40%{opacity:1}}

/* ── BOWLER BODY LEAN during run-up ── */
.bowler-body{
  transform-origin:375px 110px;
  animation:bodyLean 5.6s ease-in-out infinite;
}
@keyframes bodyLean{
  0%,25%   {transform:rotate(-8deg)} /* forward lean running */
  30%      {transform:rotate(0deg)}  /* upright at crease */
  85%      {transform:rotate(0deg)}
  86%,100% {transform:rotate(-8deg)}
}

/* ════════════════════════════════════════════
   NAME / CONTACT / QUIZ / DONE SCREENS
════════════════════════════════════════════ */
.name-screen,.contact-screen,.done{display:flex;flex-direction:column;align-items:center;text-align:center}
.scr-q    {font-size:clamp(1.9rem,7.8vw,2.85rem);font-weight:800;line-height:1.1;letter-spacing:-.032em;color:var(--text-deep);margin-bottom:10px}
.scr-hint {font-size:.88rem;font-weight:400;font-style:italic;color:var(--text-soft);margin-bottom:30px;line-height:1.6}

.field-block{width:100%;max-width:360px;display:flex;flex-direction:column;gap:13px;margin-bottom:24px}
.f-wrap {width:100%;text-align:left}
.f-label{display:block;font-size:.65rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--green-soft);margin-bottom:7px;padding-left:3px}
.f-label span{font-weight:500;text-transform:none;letter-spacing:.04em;color:var(--text-faint);font-size:.65rem}
.f-inp{
  width:100%;padding:16px 20px;border-radius:16px;
  border:2px solid var(--green-ghost);
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  font-family:inherit;font-size:.97rem;font-weight:600;color:var(--text-deep);
  outline:none;box-shadow:0 2px 14px rgba(29,61,50,0.04);
  transition:border-color .26s var(--ease-out),box-shadow .26s var(--ease-out);
}
.f-inp.single{text-align:center;font-size:1.1rem}
.f-inp::placeholder{color:var(--text-faint);font-weight:400;font-style:italic}
.f-inp:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(55,107,85,0.1),0 4px 22px rgba(29,61,50,0.08)}
.f-inp.err{border-color:#D06060;box-shadow:0 0 0 3px rgba(208,96,96,0.1)}
.f-err{font-size:.7rem;font-weight:500;color:#B84040;margin-top:5px;padding-left:3px;display:none}
.f-err.show{display:block}

/* QUIZ */
.quiz{display:flex;flex-direction:column}
.p-track{width:100%;height:3px;border-radius:999px;background:rgba(160,196,178,0.2);overflow:hidden;margin-bottom:9px}
.p-fill {height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green-mist),var(--green));transition:width 1.5s var(--ease-out)}
.p-row  {display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.p-cat  {font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--green-soft)}
.p-num  {font-size:.68rem;font-weight:500;color:var(--text-faint);letter-spacing:.04em}
.p-hey  {font-size:.72rem;font-weight:700;font-style:italic;color:var(--green-soft);margin-bottom:28px}
.q-h    {font-size:clamp(1.55rem,5.8vw,2.28rem);font-weight:800;line-height:1.18;letter-spacing:-.025em;color:var(--text-deep);margin-bottom:9px}
.q-ctx  {font-size:.8rem;font-weight:400;font-style:italic;color:var(--text-soft);margin-bottom:20px;line-height:1.5;opacity:.88}
.opts   {display:flex;flex-direction:column;gap:9px;margin-bottom:24px}

.opt{
  display:flex;align-items:center;gap:13px;
  width:100%;padding:15px 17px;border-radius:17px;
  background:var(--surface);border:1.5px solid rgba(206,229,216,0.85);
  box-shadow:0 1px 10px rgba(29,61,50,0.035);
  cursor:pointer;font-family:inherit;
  font-size:clamp(.84rem,2.2vw,.93rem);font-weight:500;color:var(--text-body);
  text-align:left;line-height:1.44;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .28s var(--ease-out),box-shadow .28s var(--ease-out),
             background .28s var(--ease-out),transform .2s var(--ease-spring),color .28s;
  position:relative;overflow:hidden;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.opt::after{content:'';position:absolute;top:0;left:0;right:0;height:48%;border-radius:inherit;
  background:linear-gradient(180deg,rgba(255,255,255,0.48) 0%,transparent 100%);pointer-events:none}
.opt:hover:not(.sel){border-color:var(--green-ghost);box-shadow:0 4px 20px rgba(29,61,50,0.08);transform:translateY(-1px);color:var(--text-deep)}
.opt:active:not(.sel){transform:scale(0.983)}
.opt.sel{border-color:var(--green);border-width:2px;background:linear-gradient(135deg,rgba(206,229,216,0.55),rgba(232,242,236,0.4));color:var(--text-deep);box-shadow:0 5px 28px rgba(29,61,50,0.1),0 0 0 4px rgba(55,107,85,0.06);transform:scale(1.007)}

/* ══════════════════════════════════════════════════
   SCREEN 1 — WELCOME  (Tiimo staggered pop-in)
══════════════════════════════════════════════════ */
function showWelcome(){
  const hasSaved = loadP();
  sc.innerHTML=`
    <div class="welcome">
      <div class="pop pop0"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <p  class="w-tag  pop pop1">${greet()}, Champ</p>
      <h1 class="w-title pop pop2">Welcome to<br>SmartCrick AI</h1>
      <p  class="w-sub   pop pop3">A few thoughtful questions to build<br>a training journey entirely yours.</p>
      <div class="pop pop4">${cricketScene()}</div>
      ${hasSaved && qi>0 ? `
        <div class="resume-card pop pop5">
          <p>Welcome back, <strong>${userName}</strong>! You left off at question <strong>${qi+1} of ${TOTAL}</strong>.</p>
          <div class="resume-btns">
            <button class="btn-res" id="btn-cont">Continue &nbsp;${ARR}</button>
            <button class="btn-frsh" id="btn-fresh">Start fresh</button>
          </div>
        </div>
      ` : `
        <div class="pop pop5" style="margin-top:22px">
          <button class="cta" id="begin">Begin &nbsp;${ARR}</button>
        </div>
      `}
    </div>`;

  const beginBtn  = document.getElementById("begin");
  if(beginBtn) beginBtn.addEventListener("click",()=>{clearP();qi=0;answers={};userName="";userEmail="";userPhone="";goTo(showName);});
  const contBtn   = document.getElementById("btn-cont");
  if(contBtn)  contBtn.addEventListener("click",()=>goTo(showQuiz));
  const freshBtn  = document.getElementById("btn-fresh");
  if(freshBtn) freshBtn.addEventListener("click",()=>{clearP();qi=0;answers={};userName="";userEmail="";userPhone="";goTo(showName);});
}

/* ══════════════════════════════════════════════════
   SCREEN 2 — NAME
══════════════════════════════════════════════════ */
function showName(){
  sc.innerHTML=`
    <div class="name-screen">
      <div class="pop pop0"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <h2 class="scr-q  pop pop1">What should we<br>call you, Champ?</h2>
      <p  class="scr-hint pop pop2">This is how we'll personalise everything for you.</p>
      <div class="pop pop3" style="width:100%;max-width:360px;margin-bottom:24px">
        <input class="f-inp single" id="nf" type="text" placeholder="Your first name…"
          autocomplete="given-name" autocorrect="off" spellcheck="false" maxlength="40"
          value="${userName}"/>
      </div>
      <div class="pop pop4">
        <button class="cta" id="ngo" ${userName?"":"disabled"}>Continue &nbsp;${ARR}</button>
      </div>
    </div>`;
  const inp=document.getElementById("nf"),btn=document.getElementById("ngo");
  inp.addEventListener("input",()=>{btn.disabled=inp.value.trim().length===0});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"&&!btn.disabled)btn.click()});
  btn.addEventListener("click",()=>{const v=inp.value.trim();if(!v)return;userName=v;saveP();goTo(showContact);});
  setTimeout(()=>inp.focus(),900);
}

/* ══════════════════════════════════════════════════
   SCREEN 3 — CONTACT
══════════════════════════════════════════════════ */
function showContact(){
  sc.innerHTML=`
    <div class="contact-screen">
      <div class="pop pop0"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <h2 class="scr-q  pop pop1">Stay in touch,<br>${userName}.</h2>
      <p  class="scr-hint pop pop2">How should SmartCrick AI reach you?</p>
      <div class="field-block pop pop3">
        <div class="f-wrap">
          <label class="f-label" for="fe">Email address <span>· required</span></label>
          <input class="f-inp" id="fe" type="email" placeholder="you@example.com"
            value="${userEmail}" autocomplete="email" autocorrect="off" spellcheck="false" maxlength="120"/>
          <p class="f-err" id="eerr">Please enter a valid email address.</p>
        </div>
        <div class="f-wrap">
          <label class="f-label" for="fp">Phone number <span>· optional</span></label>
          <input class="f-inp" id="fp" type="tel" placeholder="+1 234 567 8900"
            value="${userPhone}" autocomplete="tel" autocorrect="off" spellcheck="false" maxlength="20"/>
        </div>
      </div>
      <div class="pop pop4">
        <button class="cta" id="cgo" ${userEmail?"":"disabled"}>Continue &nbsp;${ARR}</button>
      </div>
      <div style="margin-top:14px" class="pop pop5">
        <button class="back" id="cbk">${IBACK} Back</button>
      </div>
    </div>`;

  const ei=document.getElementById("fe"),pi=document.getElementById("fp"),
        btn=document.getElementById("cgo"),err=document.getElementById("eerr"),
        bk=document.getElementById("cbk");
  const ok=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  ei.addEventListener("input",()=>{err.classList.remove("show");ei.classList.remove("err");btn.disabled=ei.value.trim().length===0;});
  ei.addEventListener("keydown",e=>{if(e.key==="Enter")pi.focus();});
  pi.addEventListener("keydown",e=>{if(e.key==="Enter"&&!btn.disabled)btn.click();});
  btn.addEventListener("click",()=>{
    const email=ei.value.trim();
    if(!ok(email)){ei.classList.add("err");err.classList.add("show");ei.focus();return;}
    userEmail=email;userPhone=pi.value.trim();saveP();goTo(showQuiz);
  });
  bk.addEventListener("click",()=>{if(!busy)goTo(showName);});
  setTimeout(()=>{if(!userEmail)ei.focus();},900);
}

/* ══════════════════════════════════════════════════
   SCREEN 4 — QUIZ
══════════════════════════════════════════════════ */
function showQuiz(){
  const d=Qs[qi],pct=((qi+1)/TOTAL*100).toFixed(2),sel=answers[qi],ctx=CAT_CTX[d.cat]||"";
  sc.innerHTML=`
    <div class="quiz">
      <div class="pop pop0">
        <div class="p-track"><div class="p-fill" style="width:${pct}%"></div></div>
        <div class="p-row">
          <span class="p-cat">${d.cat}</span>
          <span class="p-num">${qi+1} / ${TOTAL}</span>
        </div>
        <p class="p-hey">For you, ${userName} ↓</p>
      </div>
      <h2 class="q-h  pop pop1">${d.q}</h2>
      <p  class="q-ctx pop pop2">${ctx}</p>
      <div class="opts pop pop3">
        ${d.opts.map(o=>`
          <button class="opt${sel===o?" sel":""}" data-txt="${o.replace(/"/g,"&quot;")}">
            <span class="ring">${sel===o?CHK:""}</span>
            <span class="opt-txt">${o}</span>
          </button>`).join("")}
      </div>
      <div class="pop pop4">
        <button class="back" id="bk">${IBACK} Back</button>
      </div>
    </div>`;

  sc.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(busy)return;
      const txt=btn.dataset.txt; answers[qi]=txt; saveP();
      sc.querySelectorAll(".opt").forEach(b=>{
        const y=b.dataset.txt===txt;
        b.classList.toggle("sel",y);
        b.querySelector(".ring").innerHTML=y?CHK:"";
        b.style.pointerEvents="none";
      });
      document.getElementById("bk").style.pointerEvents="none";
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        if(qi<TOTAL-1){qi++;saveP();goTo(showQuiz);}
        else goTo(showDone);
      }));
    });
  });

  document.getElementById("bk").addEventListener("click",()=>{
    if(busy)return;
    if(qi===0)goTo(showContact);
    else{qi--;goTo(showQuiz);}
  });
}

/* ══════════════════════════════════════════════════
   SCREEN 5 — DONE
══════════════════════════════════════════════════ */
function showDone(){
  clearP();
  sc.innerHTML=`
    <div class="done">
      <div class="pop pop0"><img class="done-logo" src="${LOGO}" alt="SmartCrick AI"/></div>
      <div class="done-halo pop pop1">
        <div class="done-circle">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      <h2 class="done-h  pop pop2">You're all set,<br>${userName}!</h2>
      <p  class="done-p  pop pop3">Your personalized cricket journey has been crafted.<br>SmartCrick AI is ready when you are.</p>
      <p  class="done-hint pop pop4">Step onto the field. The best version of you awaits.</p>
      <div class="pop pop5">
        <a href="https://smartcricai.base44.app" class="cta">Start Training &nbsp;${ARR}</a>
      </div>
      <p class="save-msg pop pop6" id="smsg">Saving your responses…</p>
    </div>`;
  submitToSheets();
}

/* ══════════════════════════════════════════════════
   SHEETS SUBMIT
══════════════════════════════════════════════════ */
function submitToSheets(){
  const msg=document.getElementById("smsg");
  if(!SHEET_URL||SHEET_URL==="PASTE_YOUR_APPS_SCRIPT_URL_HERE"){if(msg)msg.textContent="";return;}
  fetch(SHEET_URL,{
    method:"POST",mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:userName,email:userEmail,phone:userPhone||"—",questions:Qs.map(q=>q.q),answers:Qs.map((_,i)=>answers[i]||"")})
  })
  .then(()=>{if(msg){msg.textContent="✓ Responses saved";msg.style.color="var(--green-soft)"}})
  .catch(()=>{if(msg){msg.textContent="⚠ Could not save";msg.style.color="var(--text-faint)"}});
}

/* ══════════════════════════════════════════════════
   BOOT — audio starts immediately, welcome pops in
══════════════════════════════════════════════════ */
setIcon();
startAudio();   /* ← music fires on page load, not on Begin */

showWelcome();  /* no transition on first load — elements just pop in */
</script>
