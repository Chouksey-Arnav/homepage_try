<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SmartCrick AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F8F6;--surface:rgba(255,255,255,0.93);
  --green-deep:#22453A;--green-mid:#2E6651;--green:#3B7D63;
  --green-soft:#6BA88C;--green-mist:#A8CCBB;--green-ghost:#D6EAE0;
  --text-deep:#182E26;--text-body:#3D6655;--text-soft:#7BA896;--text-faint:#B0CCBF;
  --ease:cubic-bezier(0.16,1,0.3,1);--ease-in:cubic-bezier(0.4,0,1,1);
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text-deep);-webkit-font-smoothing:antialiased;overflow:hidden}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}

/* ── BACKGROUND POOLS ─────────────────────────── */
.pool{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(110px);will-change:transform}
.pool-1{width:680px;height:680px;top:-200px;right:-180px;background:radial-gradient(circle,rgba(90,180,130,0.14)0%,transparent 60%);animation:drift1 28s ease-in-out infinite}
.pool-2{width:520px;height:520px;bottom:-150px;left:-140px;background:radial-gradient(circle,rgba(70,150,110,0.11)0%,transparent 60%);animation:drift2 34s ease-in-out infinite}
.pool-3{width:360px;height:360px;top:38%;left:52%;background:radial-gradient(circle,rgba(110,190,150,0.09)0%,transparent 60%);animation:drift3 22s ease-in-out infinite}
.pool-4{width:250px;height:250px;top:6%;left:6%;background:radial-gradient(circle,rgba(80,160,120,0.07)0%,transparent 60%);animation:drift1 42s ease-in-out infinite reverse}
@keyframes drift1{0%,100%{transform:translate(0,0)scale(1)}33%{transform:translate(22px,-32px)scale(1.04)}66%{transform:translate(-18px,22px)scale(0.97)}}
@keyframes drift2{0%,100%{transform:translate(0,0)scale(1)}40%{transform:translate(-28px,-18px)scale(1.05)}75%{transform:translate(16px,28px)scale(0.96)}}
@keyframes drift3{0%,100%{transform:translate(-50%,0)scale(1)}50%{transform:translate(-50%,-20px)scale(1.07)}}

/* ── MUTE ─────────────────────────────────────── */
#mute-btn{position:fixed;top:20px;right:20px;z-index:300;width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(168,204,187,0.45);background:rgba(255,255,255,0.62);backdrop-filter:blur(20px)saturate(1.6);-webkit-backdrop-filter:blur(20px)saturate(1.6);box-shadow:0 2px 20px rgba(34,69,58,0.07);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.25s var(--ease),box-shadow 0.25s var(--ease),background 0.25s}
#mute-btn:hover{transform:scale(1.12);box-shadow:0 6px 28px rgba(34,69,58,0.13);background:rgba(255,255,255,0.88)}
#mute-btn:active{transform:scale(0.9)}

/* ── STAGE ────────────────────────────────────── */
#stage{position:relative;z-index:10;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;padding:28px 22px 52px;overflow:hidden}
#screen{width:100%;max-width:500px;will-change:opacity,transform}

/* ── TRANSITIONS — bigger, dreamier ──────────── */
#screen.out{animation:scOut 0.38s var(--ease-in) forwards}
#screen.in {animation:scIn  1.25s var(--ease)    forwards}
@keyframes scOut{
  0%  {opacity:1;transform:translateY(0)   scale(1);    filter:blur(0px)}
  100%{opacity:0;transform:translateY(-22px)scale(0.978);filter:blur(8px)}
}
@keyframes scIn{
  0%  {opacity:0;transform:translateY(44px)scale(0.974);filter:blur(10px)}
  45% {filter:blur(0px)}
  100%{opacity:1;transform:translateY(0)   scale(1);    filter:blur(0px)}
}

/* ── SHARED: LOGO RING ────────────────────────── */
.logo-ring{position:relative;margin-bottom:22px;animation:breatheLogo 7s ease-in-out infinite}
.logo-ring::before{content:'';position:absolute;inset:-16px;border-radius:44px;background:radial-gradient(circle,rgba(90,180,130,0.16)0%,transparent 70%);animation:halo 7s ease-in-out infinite}
.logo-ring img{position:relative;width:88px;height:88px;border-radius:24px;object-fit:contain;box-shadow:0 18px 56px rgba(34,69,58,0.17),0 4px 14px rgba(34,69,58,0.09)}
@keyframes breatheLogo{0%,100%{transform:translateY(0)scale(1)}50%{transform:translateY(-6px)scale(1.02)}}
@keyframes halo{0%,100%{opacity:0.5;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}

/* ── SHARED: CTA ──────────────────────────────── */
.cta{display:inline-flex;align-items:center;gap:10px;padding:18px 50px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:1rem;font-weight:700;letter-spacing:0.01em;color:#fff;text-decoration:none;background:linear-gradient(135deg,var(--green-mid)0%,var(--green)100%);box-shadow:0 10px 40px rgba(34,69,58,0.22),0 3px 10px rgba(34,69,58,0.12),inset 0 1px 0 rgba(255,255,255,0.15);transition:transform 0.28s var(--ease),box-shadow 0.28s var(--ease);position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,0.11)0%,transparent 50%);pointer-events:none}
.cta:hover{transform:translateY(-3px)scale(1.04);box-shadow:0 20px 54px rgba(34,69,58,0.27),0 6px 18px rgba(34,69,58,0.15)}
.cta:active{transform:scale(0.96)}
.cta:disabled{opacity:0.35;cursor:not-allowed;transform:none!important;box-shadow:none}

/* ── WELCOME ──────────────────────────────────── */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center}
.w-tag  {font-size:0.72rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--green-soft);margin-bottom:10px}
.w-title{font-size:clamp(2.4rem,9.5vw,3.5rem);font-weight:800;line-height:1.07;letter-spacing:-0.035em;color:var(--text-deep);margin-bottom:14px}
.w-sub  {font-size:clamp(0.93rem,2.7vw,1.03rem);font-weight:400;font-style:italic;color:var(--text-body);line-height:1.75;max-width:340px;margin-bottom:36px;opacity:0.85}

/* Staggered welcome entrance */
.w-stagger{opacity:0;animation:wFadeUp 0.9s var(--ease) forwards}
.w-stagger:nth-child(1){animation-delay:0.1s}
.w-stagger:nth-child(2){animation-delay:0.28s}
.w-stagger:nth-child(3){animation-delay:0.44s}
.w-stagger:nth-child(4){animation-delay:0.60s}
.w-stagger:nth-child(5){animation-delay:0.76s}
.w-stagger:nth-child(6){animation-delay:0.92s}
@keyframes wFadeUp{
  0%  {opacity:0;transform:translateY(28px);filter:blur(6px)}
  50% {filter:blur(0)}
  100%{opacity:1;transform:translateY(0);filter:blur(0)}
}

/* ── CRICKET ANIMATION ────────────────────────── */
.cricket-wrap{width:100%;max-width:420px;margin:0 auto 18px;position:relative}
.cricket-svg{width:100%;height:auto;overflow:visible}

/* Ball incoming — bouncing physics */
@keyframes ballIn{
  0%   {transform:translate(28px,82px) rotate(0deg);   opacity:1}
  10%  {transform:translate(88px,142px)rotate(200deg)}
  17%  {transform:translate(126px,96px)rotate(310deg)}
  26%  {transform:translate(172px,142px)rotate(488deg)}
  33%  {transform:translate(208px,108px)rotate(580deg)}
  38%  {transform:translate(238px,132px)rotate(648deg);opacity:1}
  40%  {transform:translate(238px,132px)rotate(655deg);opacity:0}
  41%  {transform:translate(28px,82px)  rotate(0deg);  opacity:0}
  88%  {transform:translate(28px,82px)  rotate(0deg);  opacity:0}
  100% {transform:translate(28px,82px)  rotate(0deg);  opacity:1}
}
/* Ball outgoing — arcing flight */
@keyframes ballOut{
  0%   {transform:translate(238px,110px);opacity:0}
  40%  {transform:translate(238px,110px);opacity:0}
  42%  {opacity:1}
  55%  {transform:translate(348px,22px);opacity:1}
  68%  {transform:translate(432px,52px);opacity:0.6}
  74%  {transform:translate(480px,82px);opacity:0}
  100% {transform:translate(480px,82px);opacity:0}
}
/* Ball out spin */
@keyframes ballOutSpin{
  0%  {transform:rotate(0deg)}
  100%{transform:rotate(720deg)}
}
/* Bat swing */
@keyframes batSwing{
  0%   {transform:rotate(-38deg)}
  35%  {transform:rotate(-38deg)}
  43%  {transform:rotate(28deg)}
  58%  {transform:rotate(68deg)}
  72%  {transform:rotate(68deg)}
  88%  {transform:rotate(-38deg)}
  100% {transform:rotate(-38deg)}
}
/* Impact starburst */
@keyframes impactBurst{
  0%   {opacity:0;transform:translate(238px,115px)scale(0.2)}
  38%  {opacity:0;transform:translate(238px,115px)scale(0.2)}
  40%  {opacity:1;transform:translate(238px,115px)scale(1)}
  46%  {opacity:0;transform:translate(238px,115px)scale(1.8)}
  100% {opacity:0;transform:translate(238px,115px)scale(0)}
}
/* Ball trail arc */
@keyframes trailFade{
  0%,39%{opacity:0}
  42%{opacity:0.7}
  65%{opacity:0.4}
  75%{opacity:0}
  100%{opacity:0}
}
/* Player weight shift */
@keyframes playerLean{
  0%,35%{transform:rotate(0deg)}
  43%   {transform:rotate(-4deg)}
  60%   {transform:rotate(-4deg)}
  80%   {transform:rotate(0deg)}
  100%  {transform:rotate(0deg)}
}

/* ── NAME SCREEN ──────────────────────────────── */
.name-screen{display:flex;flex-direction:column;align-items:center;text-align:center}
.name-q   {font-size:clamp(2rem,8.5vw,3rem);font-weight:800;line-height:1.1;letter-spacing:-0.032em;color:var(--text-deep);margin-bottom:10px}
.name-hint{font-size:0.92rem;font-weight:400;font-style:italic;color:var(--text-soft);margin-bottom:32px;line-height:1.6}
.name-input-wrap{position:relative;width:100%;max-width:360px;margin-bottom:28px}
.name-input{width:100%;padding:20px 24px;border-radius:20px;border:2px solid var(--green-ghost);background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-family:inherit;font-size:1.15rem;font-weight:600;color:var(--text-deep);outline:none;box-shadow:0 2px 16px rgba(34,69,58,0.05);transition:border-color 0.28s var(--ease),box-shadow 0.28s var(--ease);text-align:center;letter-spacing:0.01em}
.name-input::placeholder{color:var(--text-faint);font-weight:400;font-style:italic}
.name-input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(59,125,99,0.1),0 4px 24px rgba(34,69,58,0.08)}

/* ── CONTACT SCREEN ───────────────────────────── */
.contact-screen{display:flex;flex-direction:column;align-items:center;text-align:center}
.contact-q   {font-size:clamp(2rem,8.5vw,3rem);font-weight:800;line-height:1.1;letter-spacing:-0.032em;color:var(--text-deep);margin-bottom:10px}
.contact-hint{font-size:0.92rem;font-weight:400;font-style:italic;color:var(--text-soft);margin-bottom:30px;line-height:1.6}
.contact-fields{width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;margin-bottom:26px}
.field-wrap{width:100%}
.field-label{display:block;font-size:0.68rem;font-weight:700;letter-spacing:0.13em;text-transform:uppercase;color:var(--green-soft);margin-bottom:7px;text-align:left;padding-left:4px}
.field-label span{font-weight:500;letter-spacing:0.03em;text-transform:none;color:var(--text-faint);font-size:0.67rem}
.contact-input{width:100%;padding:17px 22px;border-radius:18px;border:2px solid var(--green-ghost);background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-family:inherit;font-size:1rem;font-weight:600;color:var(--text-deep);outline:none;box-shadow:0 2px 14px rgba(34,69,58,0.05);transition:border-color 0.28s var(--ease),box-shadow 0.28s var(--ease);letter-spacing:0.01em}
.contact-input::placeholder{color:var(--text-faint);font-weight:400;font-style:italic}
.contact-input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(59,125,99,0.1),0 4px 22px rgba(34,69,58,0.08)}
.contact-input.err{border-color:#D97070}
.field-err{font-size:0.72rem;font-weight:500;color:#B85050;margin-top:6px;text-align:left;padding-left:4px;display:none}
.field-err.show{display:block}

/* ── QUIZ ─────────────────────────────────────── */
.quiz{display:flex;flex-direction:column}
.p-track{width:100%;height:3px;border-radius:999px;background:rgba(168,204,187,0.2);overflow:hidden;margin-bottom:11px}
.p-fill {height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green-mist),var(--green));transition:width 1.2s var(--ease)}
.p-row  {display:flex;justify-content:space-between;align-items:center;margin-bottom:36px}
.p-cat  {font-size:0.67rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--green-soft)}
.p-num  {font-size:0.72rem;font-weight:500;color:var(--text-faint);letter-spacing:0.04em}
.q-h    {font-size:clamp(1.65rem,6.2vw,2.4rem);font-weight:800;line-height:1.17;letter-spacing:-0.028em;color:var(--text-deep);margin-bottom:8px}
/* Personalised sub-text */
.q-sub  {font-size:0.82rem;font-weight:400;font-style:italic;color:var(--text-soft);margin-bottom:24px;line-height:1.6;opacity:0.9}
.opts   {display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.opt{display:flex;align-items:center;gap:14px;width:100%;padding:16px 18px;border-radius:20px;background:var(--surface);border:1.5px solid rgba(214,234,224,0.8);box-shadow:0 1px 10px rgba(34,69,58,0.04);cursor:pointer;font-family:inherit;font-size:clamp(0.86rem,2.3vw,0.95rem);font-weight:500;color:var(--text-body);text-align:left;line-height:1.5;-webkit-tap-highlight-color:transparent;transition:border-color 0.28s var(--ease),box-shadow 0.28s var(--ease),background 0.28s var(--ease),transform 0.2s var(--ease),color 0.28s var(--ease);position:relative;overflow:hidden;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.opt::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,0.5)0%,transparent 100%);pointer-events:none}
.opt:hover:not(.sel){border-color:rgba(168,204,187,0.6);box-shadow:0 5px 20px rgba(34,69,58,0.08);transform:translateY(-1px);color:var(--text-deep)}
.opt:active:not(.sel){transform:scale(0.983)}
.opt.sel{border-color:var(--green);border-width:2px;background:linear-gradient(135deg,rgba(214,234,224,0.6)0%,rgba(235,245,239,0.45)100%);color:var(--text-deep);box-shadow:0 6px 28px rgba(34,69,58,0.12),0 0 0 4px rgba(59,125,99,0.07);transform:scale(1.007)}
.ring{flex-shrink:0;width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(168,204,187,0.65);display:flex;align-items:center;justify-content:center;transition:border-color 0.28s var(--ease),background 0.28s var(--ease),transform 0.35s var(--ease);background:transparent}
.opt.sel .ring{border-color:var(--green);background:var(--green);transform:scale(1.16)}
.ring svg{display:none}.opt.sel .ring svg{display:block}
.opt-txt{flex:1}
.back{display:inline-flex;align-items:center;gap:5px;padding:8px 16px 8px 10px;border-radius:999px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:0.85rem;font-weight:600;color:var(--text-faint);transition:color 0.22s,background 0.22s,transform 0.22s var(--ease)}
.back:hover{color:var(--text-soft);background:rgba(168,204,187,0.14);transform:translateX(-2px)}
.back:active{transform:scale(0.93)}
.back.hide{visibility:hidden;pointer-events:none}

/* ── RESUME BANNER ────────────────────────────── */
.resume-bar{width:100%;max-width:360px;margin:0 auto 28px;padding:14px 18px;border-radius:18px;background:rgba(255,255,255,0.8);border:1.5px solid var(--green-ghost);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;gap:12px}
.resume-txt{font-size:0.82rem;font-weight:600;color:var(--text-body);line-height:1.4}
.resume-btn{flex-shrink:0;padding:8px 18px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:0.8rem;font-weight:700;color:#fff;background:var(--green);transition:transform 0.2s,background 0.2s}
.resume-btn:hover{background:var(--green-mid);transform:scale(1.04)}

/* ── DONE ─────────────────────────────────────── */
.done{display:flex;flex-direction:column;align-items:center;text-align:center}
.done-halo{position:relative;margin-bottom:30px}
.done-halo::before{content:'';position:absolute;inset:-18px;border-radius:50%;background:radial-gradient(circle,rgba(90,180,130,0.18)0%,transparent 70%);animation:halo 4s ease-in-out infinite}
.done-circle{position:relative;width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,var(--green-mid),var(--green));display:flex;align-items:center;justify-content:center;box-shadow:0 14px 48px rgba(34,69,58,0.28),0 4px 14px rgba(34,69,58,0.14);animation:popIn 0.8s var(--ease) both}
@keyframes popIn{0%{transform:scale(0.3);opacity:0}65%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}
.done-logo{width:52px;height:52px;border-radius:15px;object-fit:contain;margin-bottom:18px;opacity:0.88;box-shadow:0 6px 22px rgba(34,69,58,0.12)}
.done-h   {font-size:clamp(2rem,8.5vw,3.1rem);font-weight:800;line-height:1.1;letter-spacing:-0.032em;color:var(--text-deep);margin-bottom:16px}
.done-p   {font-size:clamp(0.92rem,2.5vw,1.02rem);font-weight:400;font-style:italic;color:var(--text-body);line-height:1.75;max-width:340px;margin:0 auto 10px;opacity:0.88}
.done-hint{font-size:0.82rem;font-weight:500;color:var(--text-faint);margin-bottom:40px;line-height:1.6}
.save-msg {font-size:0.76rem;font-weight:500;color:var(--green-soft);margin-top:16px;min-height:18px;letter-spacing:0.02em;opacity:0.85;transition:color 0.3s}

/* ── WATERMARK ────────────────────────────────── */
.wm{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:rgba(107,168,140,0.28);pointer-events:none;z-index:5;white-space:nowrap}

/* ── RESPONSIVE ───────────────────────────────── */
@media(max-width:430px){
  #stage{padding:18px 16px 44px}
  .q-h{margin-bottom:6px}.opts{gap:8px}
  .opt{padding:14px 14px;border-radius:17px}
  .p-row{margin-bottom:28px}
  .cricket-wrap{max-width:320px}
}
@media(min-height:820px){.p-row{margin-bottom:44px}}
</style>
</head>
<body>

<div class="pool pool-1"></div>
<div class="pool pool-2"></div>
<div class="pool pool-3"></div>
<div class="pool pool-4"></div>

<audio id="bgm" loop preload="auto">
  <source src="quietphase-ambient-calm-491578.mp3" type="audio/mpeg"/>
</audio>

<button id="mute-btn" aria-label="Toggle music"></button>
<div id="stage"><div id="screen"></div></div>
<div class="wm">SmartCrick AI &nbsp;·&nbsp; Train Like a Champion</div>

<script>
/* ══════════════════════════════════════════════
   CONFIG — paste your Apps Script URL here
══════════════════════════════════════════════ */
const SHEET_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

/* ══════════════════════════════════════════════
   QUESTIONS
══════════════════════════════════════════════ */
const Qs = [
  {cat:"Getting to Know You",    q:"First things first — how would you describe your cricket journey so far?",  opts:["Just getting started — I'm brand new to cricket","I've played casually with friends or in school","I play regularly at a competitive club level","I'm a seasoned player with years of serious experience"]},
  {cat:"Getting to Know You",    q:"How many years have you been playing cricket?",                              opts:["Less than 1 year","1–3 years","3–7 years","7+ years"]},
  {cat:"Your Playing Identity",  q:"When you step onto the field, what role feels most like you?",              opts:["Batsman — I live for runs","Bowler — I love taking wickets","All-rounder — I do it all","Wicket-keeper — the gloves are my home"]},

/* ══════════════════════════════════════════════
   LOCAL STORAGE — progress saving
══════════════════════════════════════════════ */
const SAVE_KEY = "sc_progress_v2";

function saveProgress(screen) {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      screen, userName, userEmail, userPhone, qi, answers
    }));
  } catch(e) {}
}

function loadProgress() {
  try {
    const d = localStorage.getItem(SAVE_KEY);
    return d ? JSON.parse(d) : null;
  } catch(e) { return null; }
}

function clearProgress() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

/* ══════════════════════════════════════════════
   AUDIO — autoplay on load, fallback on interaction
══════════════════════════════════════════════ */
const bgm  = document.getElementById("bgm");
const mBtn = document.getElementById("mute-btn");

function setMuteIcon() {
  mBtn.innerHTML = muted
    ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B7D63" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3B7D63" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
}

function tryPlay() {
  bgm.volume = 0.12;
  bgm.play().then(() => {
    playing = true; muted = false; setMuteIcon();
  }).catch(() => {
    /* Browser blocked autoplay — wait for first interaction */
    const unlock = () => {
      bgm.play().then(() => {
        playing = true; muted = false; setMuteIcon();
      }).catch(() => {});
      ['click','touchstart','keydown'].forEach(e => document.removeEventListener(e, unlock));
    };
    ['click','touchstart','keydown'].forEach(e => document.addEventListener(e, unlock, {once:true}));
  });
}

mBtn.addEventListener("click", () => {
  if (!playing) { tryPlay(); return; }
  muted = !muted;
  bgm.muted = muted;
  setMuteIcon();
});

   TRANSITION ENGINE
══════════════════════════════════════════════ */
const sc = document.getElementById("screen");

function transition(fn) {
  if (busy) return; busy = true;
  sc.classList.remove("in"); sc.classList.add("out");
  setTimeout(() => {
    sc.classList.remove("out"); fn(); void sc.offsetWidth;
    sc.classList.add("in");
    setTimeout(() => { sc.classList.remove("in"); busy = false; }, 1250);
  }, 380);
}

          <line x1="21"  y1="-21" x2="-21" y2="21"  stroke="rgba(255,180,20,0.5)" stroke-width="2"   stroke-linecap="round"/>
          <line x1="-26" y1="-10" x2="26" y2="10"   stroke="rgba(255,200,30,0.3)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="26"  y1="-10" x2="-26" y2="10"  stroke="rgba(255,200,30,0.3)" stroke-width="1.5" stroke-linecap="round"/>
        </g>

      </g><!-- end clip group -->
    </svg>
  </div>`;
}

/* ══════════════════════════════════════════════
   SCREEN 1 — WELCOME
══════════════════════════════════════════════ */
function showWelcome() {
  const saved = loadProgress();

  sc.innerHTML = `
    <div class="welcome">
      <div class="logo-ring w-stagger">
        <img src="${LOGO}" alt="SmartCrick AI"/>
      </div>
      <p class="w-tag w-stagger">${greet()}, Champ</p>
      <h1 class="w-title w-stagger">Welcome to<br>SmartCrick AI</h1>
      ${cricketSVG()}
      <p class="w-sub w-stagger">A few thoughtful questions to build<br>a training journey that is entirely yours.</p>
      ${saved && saved.screen === 'quiz' ? `
        <div class="resume-bar w-stagger">
          <span class="resume-txt">Welcome back, <strong>${saved.userName}</strong>.<br>Continue from question ${(saved.qi||0)+1}?</span>
          <button class="resume-btn" id="resume-btn">Resume</button>
        </div>
      ` : ''}
      <button class="cta w-stagger" id="begin">Begin &nbsp;${ARR}</button>
    </div>`;

  /* Resume saved progress */
  const resumeBtn = document.getElementById("resume-btn");
  if (resumeBtn) {
    resumeBtn.addEventListener("click", () => {
      if (!saved) return;
      userName  = saved.userName  || "";
      userEmail = saved.userEmail || "";
      userPhone = saved.userPhone || "";
      qi        = saved.qi        || 0;
      answers   = saved.answers   || {};
      transition(showQuiz);
    });
  }

  document.getElementById("begin").addEventListener("click", () => {
    clearProgress();
    transition(showName);
  });
}

/* ══════════════════════════════════════════════
   SCREEN 2 — NAME
══════════════════════════════════════════════ */
function showName() {
  sc.innerHTML = `
    <div class="name-screen">
      <div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div>
      <h2 class="name-q">What should we<br>call you, Champ?</h2>
      <p class="name-hint">This is how we'll personalise everything for you.</p>
      <div class="name-input-wrap">
        <input class="name-input" id="name-field" type="text"
          placeholder="Your first name…"
          autocomplete="off" autocorrect="off" spellcheck="false" maxlength="40"/>
      </div>
      <button class="cta" id="name-go" disabled>Continue &nbsp;${ARR}</button>
    </div>`;

  const inp = document.getElementById("name-field");
  const btn = document.getElementById("name-go");
  inp.addEventListener("input", () => { btn.disabled = inp.value.trim().length === 0; });
  inp.addEventListener("keydown", e => { if (e.key==="Enter" && !btn.disabled) btn.click(); });
  btn.addEventListener("click", () => {
    const v = inp.value.trim(); if (!v) return;
    userName = v;
    saveProgress("name");
    transition(showContact);
  });
  setTimeout(() => inp.focus(), 900);
}

/* ══════════════════════════════════════════════
   SCREEN 3 — CONTACT
══════════════════════════════════════════════ */
function showContact() {
  sc.innerHTML = `
    <div class="contact-screen">
      <div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div>
      <h2 class="contact-q">Stay in touch,<br>${userName}.</h2>
      <p class="contact-hint">How should SmartCrick AI reach you?</p>
      <div class="contact-fields">
        <div class="field-wrap">
          <label class="field-label" for="f-email">Email address <span>· required</span></label>
          <input class="contact-input" id="f-email" type="email"
            placeholder="you@example.com"
            autocomplete="email" autocorrect="off" spellcheck="false" maxlength="120"
            value="${userEmail}"/>
          <p class="field-err" id="email-err">Please enter a valid email address.</p>
        </div>
        <div class="field-wrap">
          <label class="field-label" for="f-phone">Phone number <span>· optional</span></label>
          <input class="contact-input" id="f-phone" type="tel"
            placeholder="+1 234 567 8900"
            autocomplete="tel" autocorrect="off" spellcheck="false" maxlength="20"
            value="${userPhone}"/>
        </div>
      </div>
      <button class="cta" id="contact-go" ${userEmail?'':'disabled'}>Continue &nbsp;${ARR}</button>
      <button class="back" id="back-contact" style="margin-top:16px">${BACK} Back</button>
    </div>`;

  const eInp = document.getElementById("f-email");
  const pInp = document.getElementById("f-phone");
  const btn  = document.getElementById("contact-go");
  const eErr = document.getElementById("email-err");

  function validEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  eInp.addEventListener("input", () => {
    eErr.classList.remove("show"); eInp.classList.remove("err");
    btn.disabled = eInp.value.trim().length === 0;
  });
  eInp.addEventListener("keydown", e => { if(e.key==="Enter") pInp.focus(); });
  pInp.addEventListener("keydown", e => { if(e.key==="Enter" && !btn.disabled) btn.click(); });

  btn.addEventListener("click", () => {
    const email = eInp.value.trim();
    if (!validEmail(email)) {
      eInp.classList.add("err"); eErr.classList.add("show"); eInp.focus(); return;
    }
    userEmail = email; userPhone = pInp.value.trim();
    saveProgress("contact");
    qi = 0; answers = {};
    transition(showQuiz);
  });

  document.getElementById("back-contact").addEventListener("click", () => {
    if (!busy) transition(showName);
  });

  setTimeout(() => { if (!userEmail) eInp.focus(); }, 900);
}

/* ══════════════════════════════════════════════
   SCREEN 4 — QUIZ
══════════════════════════════════════════════ */
function showQuiz() {
  const d   = Qs[qi];
  const pct = ((qi + 1) / TOTAL * 100).toFixed(2);
  const sel = answers[qi];
  const sub = CAT_SUB[d.cat] ? CAT_SUB[d.cat](userName) : "";

  sc.innerHTML = `
    <div class="quiz">
      <div class="p-track"><div class="p-fill" style="width:${pct}%"></div></div>
      <div class="p-row">
        <span class="p-cat">${d.cat}</span>
        <span class="p-num">${qi + 1} / ${TOTAL}</span>
      </div>
      <h2 class="q-h">${d.q}</h2>
      ${sub ? `<p class="q-sub">${sub}</p>` : ""}
      <div class="opts">
        ${d.opts.map((o,i) => `
          <button class="opt${sel===o?" sel":""}" data-txt="${o.replace(/"/g,"&quot;")}">
            <span class="ring">${sel===o?CHK:""}</span>
            <span class="opt-txt">${o}</span>
          </button>`).join("")}
      </div>
      <button class="back" id="back">${BACK} Back</button>
    </div>`;

  /* Option clicks */
  sc.querySelectorAll(".opt").forEach(btn => {
    btn.addEventListener("click", () => {
      if (busy) return;
      const txt = btn.dataset.txt;
      answers[qi] = txt;
      saveProgress("quiz");

      sc.querySelectorAll(".opt").forEach(b => {
        const yes = b.dataset.txt === txt;
        b.classList.toggle("sel", yes);
        b.querySelector(".ring").innerHTML = yes ? CHK : "";
        b.style.pointerEvents = "none";
      });
      const bb = document.getElementById("back");
      if (bb) bb.style.pointerEvents = "none";

      requestAnimationFrame(() => requestAnimationFrame(() => {
        if (qi < TOTAL - 1) { qi++; transition(showQuiz); }
        else                { clearProgress(); transition(showDone); }
      }));
    });
  });

  /* Back button:
     Q0 → go back to contact screen
     Q1+ → go back one question */
  const bb = document.getElementById("back");
  bb.addEventListener("click", () => {
    if (busy) return;
    if (qi === 0) { transition(showContact); }
    else          { qi--; transition(showQuiz); }
  });
}

/* ══════════════════════════════════════════════
   SCREEN 5 — DONE
══════════════════════════════════════════════ */
function showDone() {
  sc.innerHTML = `
    <div class="done">
      <img class="done-logo" src="${LOGO}" alt="SmartCrick AI"/>
      <div class="done-halo">
        <div class="done-circle">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none"
               stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      <h2 class="done-h">You're all set,<br>${userName}!</h2>
      <p class="done-p">Your personalized cricket journey has been crafted.<br>SmartCrick AI is ready when you are.</p>
      <p class="done-hint">Step onto the field. The best version of you awaits.</p>
      <a href="https://smartcricai.base44.app" class="cta">Start Training &nbsp;${ARR}</a>
      <p class="save-msg" id="save-msg">Saving your responses…</p>
    </div>`;

  submitToSheets();
}

/* ══════════════════════════════════════════════
   GOOGLE SHEETS SUBMIT
══════════════════════════════════════════════ */
function submitToSheets() {
  const msg = document.getElementById("save-msg");
  if (!SHEET_URL || SHEET_URL === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") {
    if (msg) msg.textContent = ""; return;
  }
  const payload = {
    name:      userName,
    email:     userEmail,
    phone:     userPhone || "—",
    questions: Qs.map(q => q.q),
    answers:   Qs.map((_, i) => answers[i] || "")
  };
  fetch(SHEET_URL, {
    method:"POST", mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(payload)
  })
  .then(() => {
    if (msg) { msg.textContent = "✓ Responses saved successfully"; msg.style.color = "var(--green-soft)"; }
  })
  .catch(() => {
    if (msg) { msg.textContent = "⚠ Could not save — check connection"; msg.style.color = "var(--text-faint)"; }
  });
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
setMuteIcon();
tryPlay();           // attempt autoplay immediately

sc.classList.add("in");
showWelcome();
setTimeout(() => sc.classList.remove("in"), 1250);
</script>
