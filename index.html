<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SmartCrick AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7F5; --surface:rgba(255,255,255,0.93);
  --gd:#1D3D32; --gm:#2A5C46; --g:#376B55;
  --gs:#5F9A80; --gmi:#9FC4B0; --gg:#CEE5D8;
  --td:#162B22; --tb:#365549; --ts:#6E9E88; --tf:#A8C8B8;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --out:cubic-bezier(0.16,1,0.3,1);
  --in:cubic-bezier(0.4,0,1,1);
}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--td);-webkit-font-smoothing:antialiased;overflow:hidden}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.024;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px}

/* ══════════════════════════════════════════════════════════════
   VIDEO INTRO OVERLAY
   — Full-screen video plays once, then fades to welcome screen
══════════════════════════════════════════════════════════════ */
#intro-wrap{
  position:fixed;inset:0;z-index:200;
  background:#050e0a;
  transition:opacity 1.8s cubic-bezier(0.16,1,0.3,1);
}
#intro-wrap.done{opacity:0;pointer-events:none}

/* Video fills screen with cover behaviour */
#intro-video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center;
  display:block;
}

/* Subtle dark vignette over video */
#intro-vignette{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.62) 100%);
}

/* SmartCrick AI logo/title overlaid on video */
#intro-logo-wrap{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:72px;
  opacity:0;animation:introLogoFade 1s ease-out 1.0s forwards;
}
#intro-logo-wrap img{
  width:62px;height:62px;border-radius:18px;object-fit:contain;
  box-shadow:0 12px 40px rgba(0,0,0,0.5);margin-bottom:14px;
}
#intro-logo-wrap .intro-brand{
  font-size:clamp(1.5rem,5vw,2.2rem);font-weight:800;letter-spacing:-.02em;
  color:#fff;text-shadow:0 2px 24px rgba(0,0,0,0.6);
  line-height:1.1;text-align:center;
}
#intro-logo-wrap .intro-tag{
  font-size:clamp(.76rem,2vw,.88rem);font-weight:500;letter-spacing:.18em;
  text-transform:uppercase;color:rgba(160,220,185,0.90);
  margin-top:8px;text-shadow:0 1px 12px rgba(0,0,0,0.5);
}
@keyframes introLogoFade{
  0%{opacity:0;transform:translateY(12px)}
  100%{opacity:1;transform:translateY(0)}
}

/* Skip button */
#skip-btn{
  position:absolute;bottom:22px;right:22px;z-index:10;
  padding:10px 22px;border-radius:999px;
  border:1.5px solid rgba(95,154,128,0.40);
  background:rgba(5,14,10,0.70);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:rgba(95,154,128,0.92);
  font-family:'DM Sans',sans-serif;font-size:0.74rem;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;transition:background .22s,color .22s,transform .18s;
  opacity:0;animation:skipFadeIn 0.55s ease-out 2.2s forwards;
}
#skip-btn:hover{background:rgba(55,107,85,0.30);color:rgba(165,210,185,1);transform:scale(1.04)}
@keyframes skipFadeIn{to{opacity:1}}

/* ══════════════════════════════════════════════════════════════
   BACKGROUND POOLS (visible beneath welcome screen)
══════════════════════════════════════════════════════════════ */
.pool{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(110px);will-change:transform}
.p1{width:680px;height:680px;top:-200px;right:-180px;background:radial-gradient(circle,rgba(80,170,120,.11) 0%,transparent 62%);animation:d1 30s ease-in-out infinite}
.p2{width:520px;height:520px;bottom:-140px;left:-140px;background:radial-gradient(circle,rgba(60,140,100,.08) 0%,transparent 62%);animation:d2 36s ease-in-out infinite}
.p3{width:360px;height:360px;top:38%;left:52%;background:radial-gradient(circle,rgba(100,180,140,.07) 0%,transparent 62%);animation:d3 24s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0)}35%{transform:translate(24px,-36px)}70%{transform:translate(-18px,22px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}42%{transform:translate(-26px,-20px)}78%{transform:translate(16px,28px)}}
@keyframes d3{0%,100%{transform:translate(-50%,0)}52%{transform:translate(-50%,-18px)}}

/* ══════════════════════════════════════════════════════════════
   MUTE BUTTON
══════════════════════════════════════════════════════════════ */
#mute-btn{position:fixed;top:20px;right:20px;z-index:300;width:44px;height:44px;border-radius:50%;border:1.5px solid rgba(160,200,180,.4);background:rgba(255,255,255,.62);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);box-shadow:0 2px 18px rgba(30,65,50,.07);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .22s var(--spring),box-shadow .22s var(--out)}
#mute-btn:hover{transform:scale(1.13);box-shadow:0 6px 26px rgba(30,65,50,.12)}
#mute-btn:active{transform:scale(.90)}

/* ══════════════════════════════════════════════════════════════
   STAGE & SCREEN (the main onboarding flow, behind the intro)
══════════════════════════════════════════════════════════════ */
#stage{position:relative;z-index:10;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 22px 44px;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#stage::-webkit-scrollbar{display:none}
#screen{width:100%;max-width:500px;will-change:opacity,transform}
#screen.s-out{animation:sOut .38s cubic-bezier(0.4,0,1,1) forwards}
#screen.s-in {animation:sIn  .92s cubic-bezier(0.22,1,0.36,1) forwards}
@keyframes sOut{
  0%  {opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
  100%{opacity:0;transform:translateY(-32px) scale(.96);filter:blur(10px)}
}
@keyframes sIn {
  0%  {opacity:0;transform:translateY(52px) scale(.97);filter:blur(12px)}
  35% {filter:blur(0)}
  70% {transform:translateY(-3px) scale(1.004)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

/* ══════════════════════════════════════════════════════════════
   PREMIUM STAGGER SYSTEM — Tiimo-inspired spring reveals
   Each element lifts from below with a spring overshoot,
   blur lifts off, and opacity fades in — perfectly timed.
══════════════════════════════════════════════════════════════ */
.pop{opacity:0;animation:popIn .72s var(--spring) forwards}
/* Tighter stagger on welcome for that premium cascading feel */
.p0{animation-delay:.05s}
.p1{animation-delay:.18s}
.p2{animation-delay:.30s}
.p3{animation-delay:.46s}
.p4{animation-delay:.64s}
.p5{animation-delay:.82s}
.p6{animation-delay:1.00s}
@keyframes popIn{
  0%  {opacity:0;transform:translateY(28px) scale(.88);filter:blur(8px)}
  40% {opacity:1;filter:blur(0)}
  70% {transform:translateY(-4px) scale(1.008)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

/* Quote-specific animation: fades up with italic drift */
.quote-pop{
  opacity:0;
  animation:quotePop .9s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes quotePop{
  0%  {opacity:0;transform:translateY(20px);filter:blur(6px)}
  50% {opacity:1;filter:blur(0)}
  100%{opacity:1;transform:translateY(0);filter:blur(0)}
}

/* Tag line — letter-spacing blooms in */
.tag-pop{
  opacity:0;
  animation:tagPop .7s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes tagPop{
  0%  {opacity:0;letter-spacing:.28em;filter:blur(4px)}
  60% {opacity:1;filter:blur(0)}
  100%{opacity:1;letter-spacing:.18em;filter:blur(0)}
}

/* ══════════════════════════════════════════════════════════════
   LOGO RING
══════════════════════════════════════════════════════════════ */
.logo-ring{position:relative;display:inline-block;animation:breathe 7s ease-in-out infinite;margin-bottom:20px}
.logo-ring::before{content:'';position:absolute;inset:-12px;border-radius:38px;background:radial-gradient(circle,rgba(80,170,120,.14) 0%,transparent 70%);animation:halo 7s ease-in-out infinite}
.logo-ring img{position:relative;display:block;width:78px;height:78px;border-radius:22px;object-fit:contain;box-shadow:0 16px 44px rgba(29,61,50,.16),0 4px 12px rgba(29,61,50,.09)}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.018)}}
@keyframes halo{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.09)}}

/* ══════════════════════════════════════════════════════════════
   CTA BUTTON
══════════════════════════════════════════════════════════════ */
.cta{display:inline-flex;align-items:center;gap:10px;padding:17px 46px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:1rem;font-weight:700;letter-spacing:.01em;color:#fff;text-decoration:none;background:linear-gradient(135deg,var(--gm) 0%,var(--g) 100%);box-shadow:0 10px 38px rgba(29,61,50,.22),0 3px 9px rgba(29,61,50,.12),inset 0 1px 0 rgba(255,255,255,.14);transition:transform .26s var(--spring),box-shadow .26s var(--out);position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 50%);pointer-events:none}
.cta:hover{transform:translateY(-3px) scale(1.045);box-shadow:0 18px 50px rgba(29,61,50,.26),0 6px 16px rgba(29,61,50,.14)}
.cta:active{transform:scale(.955)}
.cta:disabled{opacity:.36;cursor:not-allowed;transform:none!important;box-shadow:none}

/* ══════════════════════════════════════════════════════════════
   WELCOME SCREEN
══════════════════════════════════════════════════════════════ */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:6px}
.w-tag  {font-size:.66rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gs);margin-bottom:10px}
.w-title{font-size:clamp(2.3rem,8.5vw,3.4rem);font-weight:800;line-height:1.05;letter-spacing:-.036em;color:var(--td);margin-bottom:18px}

/* Motivational quote card — sits ABOVE title */
.w-quote-wrap{
  width:100%;max-width:360px;
  margin:0 auto 20px;
  padding:16px 20px 16px 24px;
  background:rgba(55,107,85,.058);
  border:1.5px solid rgba(55,107,85,.15);
  border-radius:20px;
  position:relative;
  text-align:left;
}
.w-quote-wrap::before{
  content:'“';
  position:absolute;top:-10px;left:14px;
  font-size:3rem;line-height:1;font-weight:800;
  color:var(--gs);opacity:.30;font-family:Georgia,serif;
  pointer-events:none;
}
.w-quote{
  font-size:clamp(.85rem,2.4vw,.96rem);
  font-weight:400;font-style:italic;
  color:var(--tb);line-height:1.68;
  opacity:.92;
  padding-top:4px;
}
.w-quote strong{
  display:block;margin-top:9px;
  font-size:.65rem;font-weight:700;font-style:normal;
  letter-spacing:.12em;text-transform:uppercase;
  color:var(--gs);opacity:.80;
}

/* Stat pills row */
.w-stats{
  display:flex;gap:8px;justify-content:center;
  flex-wrap:wrap;margin-bottom:24px;
}
.w-stat{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 13px;border-radius:999px;
  background:rgba(55,107,85,.07);
  border:1.5px solid rgba(55,107,85,.12);
  font-size:.68rem;font-weight:600;color:var(--ts);
  letter-spacing:.04em;
}
.w-stat svg{flex-shrink:0;opacity:.8}

/* Subtle hint below CTA */
.w-hint{
  font-size:.68rem;font-weight:500;color:var(--tf);
  margin-top:14px;letter-spacing:.04em;opacity:.80;
}

.resume-card{width:100%;max-width:370px;margin:18px auto 0;background:rgba(55,107,85,.07);border:1.5px solid rgba(55,107,85,.18);border-radius:18px;padding:16px 20px;text-align:center}
.resume-card p{font-size:.85rem;font-weight:500;color:var(--tb);margin-bottom:13px;line-height:1.5}
.resume-card strong{color:var(--td);font-weight:700}
.resume-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-r{display:inline-flex;align-items:center;gap:7px;padding:11px 24px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.87rem;font-weight:700;color:#fff;background:var(--g);box-shadow:0 6px 22px rgba(29,61,50,.2);transition:transform .22s var(--spring),box-shadow .22s}
.btn-r:hover{transform:translateY(-2px) scale(1.04)}
.btn-f{display:inline-flex;align-items:center;gap:6px;padding:11px 16px;border-radius:999px;border:1.5px solid var(--gg);background:transparent;cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;color:var(--ts);transition:background .2s,color .2s,transform .2s var(--spring)}
.btn-f:hover{background:rgba(160,200,180,.13);color:var(--tb);transform:scale(1.02)}

/* ══════════════════════════════════════════════════════════════
   FORM SCREENS
══════════════════════════════════════════════════════════════ */
.scr{display:flex;flex-direction:column;align-items:center;text-align:center}
.scr-q   {font-size:clamp(1.85rem,7.5vw,2.8rem);font-weight:800;line-height:1.1;letter-spacing:-.032em;color:var(--td);margin-bottom:10px}
.scr-sub {font-size:.87rem;font-weight:400;font-style:italic;color:var(--ts);margin-bottom:28px;line-height:1.6}
.fblock  {width:100%;max-width:360px;display:flex;flex-direction:column;gap:13px;margin-bottom:22px}
.fwrap   {width:100%;text-align:left}
.flabel  {display:block;font-size:.64rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gs);margin-bottom:7px;padding-left:3px}
.flabel span{font-weight:500;text-transform:none;letter-spacing:.04em;color:var(--tf);font-size:.64rem}
.finp{width:100%;padding:16px 20px;border-radius:16px;border:2px solid var(--gg);background:rgba(255,255,255,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);font-family:inherit;font-size:.97rem;font-weight:600;color:var(--td);outline:none;box-shadow:0 2px 14px rgba(29,61,50,.04);transition:border-color .26s var(--out),box-shadow .26s var(--out)}
.finp.single{text-align:center;font-size:1.1rem}
.finp::placeholder{color:var(--tf);font-weight:400;font-style:italic}
.finp:focus{border-color:var(--g);box-shadow:0 0 0 4px rgba(55,107,85,.1),0 4px 22px rgba(29,61,50,.08)}
.finp.err{border-color:#D06060;box-shadow:0 0 0 3px rgba(208,96,96,.1)}
.ferr{font-size:.7rem;font-weight:500;color:#B84040;margin-top:5px;padding-left:3px;display:none}
.ferr.show{display:block}

/* ══════════════════════════════════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════════════════════════════════ */
.quiz{display:flex;flex-direction:column}
.pt{width:100%;height:3px;border-radius:999px;background:rgba(160,196,178,.2);overflow:hidden;margin-bottom:9px}
.pf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gmi),var(--g));transition:width 1.5s var(--out)}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pc{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--gs)}
.pn{font-size:.68rem;font-weight:500;color:var(--tf);letter-spacing:.04em}
.ph{font-size:.7rem;font-weight:700;font-style:italic;color:var(--gs);margin-bottom:26px}
.qh{font-size:clamp(1.5rem,5.6vw,2.2rem);font-weight:800;line-height:1.18;letter-spacing:-.024em;color:var(--td);margin-bottom:8px}
.qc{font-size:.78rem;font-weight:400;font-style:italic;color:var(--ts);margin-bottom:18px;line-height:1.5;opacity:.88}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
.opt{display:flex;align-items:center;gap:13px;width:100%;padding:15px 17px;border-radius:17px;background:var(--surface);border:1.5px solid rgba(206,229,216,.85);box-shadow:0 1px 10px rgba(29,61,50,.035);cursor:pointer;font-family:inherit;font-size:clamp(.83rem,2.2vw,.92rem);font-weight:500;color:var(--tb);text-align:left;line-height:1.44;-webkit-tap-highlight-color:transparent;transition:border-color .28s var(--out),box-shadow .28s var(--out),background .28s var(--out),transform .2s var(--spring),color .28s;position:relative;overflow:hidden;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
.opt::after{content:'';position:absolute;top:0;left:0;right:0;height:48%;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.48) 0%,transparent 100%);pointer-events:none}
.opt:hover:not(.sel){border-color:var(--gg);box-shadow:0 4px 20px rgba(29,61,50,.08);transform:translateY(-1px);color:var(--td)}
.opt:active:not(.sel){transform:scale(.983)}
.opt.sel{border-color:var(--g);border-width:2px;background:linear-gradient(135deg,rgba(206,229,216,.55),rgba(232,242,236,.4));color:var(--td);box-shadow:0 5px 28px rgba(29,61,50,.1),0 0 0 4px rgba(55,107,85,.06);transform:scale(1.007)}
.ring{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(160,196,178,.65);display:flex;align-items:center;justify-content:center;transition:border-color .25s var(--out),background .25s var(--out),transform .32s var(--spring);background:transparent}
.opt.sel .ring{border-color:var(--g);background:var(--g);transform:scale(1.18)}
.ring svg{display:none}.opt.sel .ring svg{display:block}
.opt-txt{flex:1}
.back{display:inline-flex;align-items:center;gap:5px;padding:8px 15px 8px 10px;border-radius:999px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;color:var(--tf);transition:color .2s,background .2s,transform .2s var(--spring)}
.back:hover{color:var(--ts);background:rgba(160,196,178,.13);transform:translateX(-2px)}
.back:active{transform:scale(.92)}
.back.hide{visibility:hidden;pointer-events:none}

/* ══════════════════════════════════════════════════════════════
   DONE SCREEN
══════════════════════════════════════════════════════════════ */
.done-halo{position:relative;margin-bottom:24px}
.done-halo::before{content:'';position:absolute;inset:-18px;border-radius:50%;background:radial-gradient(circle,rgba(80,170,120,.16) 0%,transparent 70%);animation:halo 4s ease-in-out infinite}
.done-circle{position:relative;width:74px;height:74px;border-radius:50%;background:linear-gradient(145deg,var(--gm),var(--g));display:flex;align-items:center;justify-content:center;box-shadow:0 14px 46px rgba(29,61,50,.26),0 4px 13px rgba(29,61,50,.14);animation:popIn .8s var(--spring) both}
.done-logo{width:46px;height:46px;border-radius:13px;object-fit:contain;margin-bottom:14px;opacity:.88;box-shadow:0 5px 20px rgba(29,61,50,.12)}
.done-h{font-size:clamp(1.8rem,7vw,2.8rem);font-weight:800;line-height:1.1;letter-spacing:-.032em;color:var(--td);margin-bottom:14px}
.done-p{font-size:clamp(.88rem,2.4vw,.97rem);font-weight:400;font-style:italic;color:var(--tb);line-height:1.75;max-width:330px;margin:0 auto 9px;opacity:.88}
.done-hint{font-size:.78rem;font-weight:500;color:var(--tf);margin-bottom:36px;line-height:1.6}
.save-msg{font-size:.7rem;font-weight:500;color:var(--gs);margin-top:14px;min-height:18px;letter-spacing:.02em;opacity:.85;transition:color .3s}

/* Watermark */
.wm{position:fixed;bottom:13px;left:50%;transform:translateX(-50%);font-size:.55rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(95,154,128,.22);pointer-events:none;z-index:5;white-space:nowrap}

@media(max-width:430px){#stage{padding:16px 15px 36px}.qh{margin-bottom:7px}.opts{gap:7px}.opt{padding:13px 13px;border-radius:15px}}
</style>
</head>
<body>

<!-- ══ VIDEO INTRO ══
     Full-screen video plays once, then fades to welcome screen.
     File: 13d16477-6541-4a53-901f-61309ebe82d0_hd.mp4  (upload this alongside index.html on GitHub)   -->
<div id="intro-wrap">
  <video id="intro-video" autoplay playsinline preload="auto"

        bk=document.getElementById("cbk");
  const ok=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  ei.addEventListener("input",()=>{er.classList.remove("show");ei.classList.remove("err");bt.disabled=ei.value.trim().length===0});
  ei.addEventListener("keydown",e=>{if(e.key==="Enter")pi.focus()});
  pi.addEventListener("keydown",e=>{if(e.key==="Enter"&&!bt.disabled)bt.click()});
  bt.addEventListener("click",()=>{const e=ei.value.trim();if(!ok(e)){ei.classList.add("err");er.classList.add("show");ei.focus();return}userEmail=e;userPhone=pi.value.trim();saveP();goTo(showQuiz)});
  bk.addEventListener("click",()=>{if(!busy)goTo(showName)});
  setTimeout(()=>{if(!userEmail)ei.focus()},900);
}

/* ══════════════════════════════════════════════════════════════
   SCREEN 4 — QUIZ (34 questions, auto-advance)
══════════════════════════════════════════════════════════════ */
function showQuiz(){
  const d=Qs[qi],pct=((qi+1)/TOTAL*100).toFixed(2),sel=answers[qi],ctx=CTX[d.cat]||"";
  sc.innerHTML=`
    <div class="quiz">
      <div class="p0 pop">
        <div class="pt"><div class="pf" style="width:${pct}%"></div></div>
        <div class="pr"><span class="pc">${d.cat}</span><span class="pn">${qi+1}&thinsp;/&thinsp;${TOTAL}</span></div>
        <p class="ph">For you, ${userName} ↓</p>
      </div>
      <h2 class="qh p1 pop">${d.q}</h2>
      <p  class="qc p2 pop">${ctx}</p>
      <div class="opts p3 pop">
        ${d.opts.map(o=>`
          <button class="opt${sel===o?" sel":""}" data-txt="${o.replace(/"/g,"&quot;")}">
            <span class="ring">${sel===o?CHK:""}</span>
            <span class="opt-txt">${o}</span>
          </button>`).join("")}
      </div>
      <div class="p4 pop">
        <button class="back" id="bk">${IB} Back</button>
      </div>
    </div>`;
  sc.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(busy)return;
      const t=btn.dataset.txt;answers[qi]=t;saveP();
      sc.querySelectorAll(".opt").forEach(b=>{const y=b.dataset.txt===t;b.classList.toggle("sel",y);b.querySelector(".ring").innerHTML=y?CHK:"";b.style.pointerEvents="none"});
      document.getElementById("bk").style.pointerEvents="none";
      requestAnimationFrame(()=>requestAnimationFrame(()=>{if(qi<TOTAL-1){qi++;saveP();goTo(showQuiz)}else goTo(showDone)}));
    });
  });
  document.getElementById("bk").addEventListener("click",()=>{if(busy)return;if(qi===0)goTo(showContact);else{qi--;goTo(showQuiz)}});
}

/* ══════════════════════════════════════════════════════════════
   SCREEN 5 — DONE
══════════════════════════════════════════════════════════════ */
function showDone(){
  clearP();
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><img class="done-logo" src="${LOGO}" alt="SmartCrick AI"/></div>
      <div class="done-halo p1 pop"><div class="done-circle">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div></div>
      <h2 class="done-h  p2 pop">You're all set,<br>${userName}!</h2>
      <p  class="done-p  p3 pop">Your personalized cricket journey has been crafted.<br>SmartCrick AI is ready when you are.</p>
      <p  class="done-hint p4 pop">Step onto the field. The best version of you awaits.</p>
      <div class="p5 pop"><a href="https://smartcricai.base44.app" class="cta">Start Training &nbsp;${AR}</a></div>
      <p class="save-msg p6 pop" id="sm">Saving your responses…</p>
    </div>`;
  submitToSheets();
}

function submitToSheets(){
  const m=document.getElementById("sm");
  if(!SHEET_URL||SHEET_URL==="PASTE_YOUR_APPS_SCRIPT_URL_HERE"){if(m)m.textContent="";return}
  fetch(SHEET_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({name:userName,email:userEmail,phone:userPhone||"—",questions:Qs.map(q=>q.q),answers:Qs.map((_,i)=>answers[i]||"")})
  }).then(()=>{if(m){m.textContent="✓ Responses saved";m.style.color="var(--gs)"}})
    .catch(()=>{if(m){m.textContent="⚠ Could not save";m.style.color="var(--tf)"}});
}


/* ══════════════════════════════════════════════════════════════
   BOOT SEQUENCE
   1. Render welcome screen (sits behind the intro overlay)  
   2. Launch cinematic canvas animation (~14.6s)
   3. endIntro() → startAudio() + fade reveals welcome screen
══════════════════════════════════════════════════════════════ */
setIcon();
showWelcome();

</script>
