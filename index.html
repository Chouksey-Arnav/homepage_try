<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#050e0a"/>
<title>SmartCrick AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7F5;--surface:rgba(255,255,255,0.94);
  --gd:#1D3D32;--gm:#2A5C46;--g:#376B55;
  --gs:#5F9A80;--gmi:#9FC4B0;--gg:#CEE5D8;
  --td:#162B22;--tb:#365549;--ts:#6E9E88;--tf:#A8C8B8;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --out:cubic-bezier(0.16,1,0.3,1);
  --ease:cubic-bezier(0.22,1,0.36,1);
  --sat:env(safe-area-inset-top,0px);
  --sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);
  --sar:env(safe-area-inset-right,0px);
}

/* Mobile-first reset: fix iOS bounce, prevent zoom */
html{
  height:100%;width:100%;
  overflow:hidden;position:fixed;
}
body{
  height:100%;width:100%;
  font-family:"DM Sans",system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--td);
  -webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;
  overflow:hidden;position:fixed;
  -webkit-tap-highlight-color:transparent;
  touch-action:pan-y;
}
body::after{
  content:"";position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.018;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

/* VIDEO INTRO */
#intro-wrap{position:fixed;inset:0;z-index:200;background:#050e0a;transition:opacity 2.0s var(--ease)}
#intro-wrap.done{opacity:0;pointer-events:none}
#intro-video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
  -webkit-playsinline:true;
}
#intro-vignette{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 28%,rgba(0,0,0,0.72) 100%);
}
#intro-overlay{
  position:absolute;bottom:0;left:0;right:0;z-index:3;
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:calc(70px + var(--sab));
  opacity:0;animation:fadeUp 1s var(--ease) 1.2s forwards;
}
#intro-overlay img{
  width:52px;height:52px;border-radius:14px;object-fit:contain;
  box-shadow:0 10px 36px rgba(0,0,0,.62);margin-bottom:10px;
}
#intro-overlay .ib{
  font-size:clamp(1.3rem,5.5vw,1.9rem);font-weight:800;
  letter-spacing:-.02em;color:#fff;
  text-shadow:0 2px 20px rgba(0,0,0,.75);text-align:center;
}
#intro-overlay .it{
  font-size:clamp(.64rem,2.4vw,.76rem);font-weight:600;
  letter-spacing:.20em;text-transform:uppercase;
  color:rgba(160,220,190,0.92);margin-top:6px;
  text-shadow:0 1px 10px rgba(0,0,0,.5);
}

/* Unmute pill */
#unmute-pill{
  position:absolute;top:calc(var(--sat) + 18px);left:50%;
  transform:translateX(-50%);z-index:10;
  display:inline-flex;align-items:center;gap:7px;
  padding:10px 20px;border-radius:999px;
  border:1.5px solid rgba(255,255,255,.24);
  background:rgba(0,0,0,.52);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:rgba(255,255,255,.90);font-family:"DM Sans",sans-serif;
  font-size:.73rem;font-weight:600;letter-spacing:.06em;cursor:pointer;
  min-height:44px;white-space:nowrap;
  transition:opacity .36s var(--ease),background .2s;
  opacity:0;animation:fadeIn .5s ease-out .5s both;
}
#unmute-pill:active{background:rgba(0,0,0,.72)}
#unmute-pill.gone{opacity:0;pointer-events:none}

/* Skip button */
#skip-btn{
  position:absolute;
  bottom:calc(var(--sab) + 20px);
  right:calc(var(--sar) + 18px);
  z-index:10;padding:10px 20px;border-radius:999px;
  border:1.5px solid rgba(95,154,128,0.42);
  background:rgba(5,14,10,0.68);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:rgba(95,154,128,0.94);font-family:"DM Sans",sans-serif;
  font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  cursor:pointer;min-height:44px;min-width:44px;
  transition:background .2s;
  opacity:0;animation:fadeIn .5s ease-out 2.4s forwards;
}
#skip-btn:active{background:rgba(55,107,85,0.32)}

/* Atmosphere */
.pool{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(90px);will-change:transform}
.pa{width:500px;height:500px;top:-160px;right:-140px;background:radial-gradient(circle,rgba(80,170,120,.10) 0%,transparent 62%);animation:d1 30s ease-in-out infinite}
.pb{width:400px;height:400px;bottom:-100px;left:-100px;background:radial-gradient(circle,rgba(60,140,100,.08) 0%,transparent 62%);animation:d2 36s ease-in-out infinite}
.pc-bg{width:280px;height:280px;top:40%;left:55%;background:radial-gradient(circle,rgba(100,180,140,.06) 0%,transparent 62%);animation:d3 24s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0)}35%{transform:translate(18px,-26px)}70%{transform:translate(-13px,16px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}42%{transform:translate(-20px,-14px)}78%{transform:translate(11px,20px)}}
@keyframes d3{0%,100%{transform:translate(-50%,0)}52%{transform:translate(-50%,-12px)}}

/* Mute button */
#mute-btn{
  position:fixed;
  top:calc(var(--sat) + 14px);
  right:calc(var(--sar) + 14px);
  z-index:300;width:44px;height:44px;border-radius:50%;
  border:1.5px solid rgba(160,200,180,.38);
  background:rgba(255,255,255,.60);
  backdrop-filter:blur(18px) saturate(1.5);
  -webkit-backdrop-filter:blur(18px) saturate(1.5);
  box-shadow:0 2px 16px rgba(30,65,50,.07);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
  transition:transform .20s var(--spring);
}
#mute-btn:active{transform:scale(.86)}

/* STAGE — the scrollable area */
#stage{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding-top:calc(var(--sat) + 60px);
  padding-left:calc(var(--sal) + 16px);
  padding-right:calc(var(--sar) + 16px);
  padding-bottom:calc(var(--sab) + 22px);
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  overscroll-behavior:contain;
}
#stage::-webkit-scrollbar{display:none}

#screen{
  width:100%;max-width:440px;
  will-change:opacity,transform;
  /* Push content to center when viewport is tall enough */
  margin:auto;
  /* Ensure minimum breathing room at bottom */
  padding-bottom:8px;
}

/* Screen transitions */
#screen.s-out{animation:sOut .30s cubic-bezier(0.4,0,1,1) forwards}
#screen.s-in{animation:sIn .88s var(--ease) forwards}
@keyframes sOut{
  0%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
  100%{opacity:0;transform:translateY(-28px) scale(.956);filter:blur(12px)}
}
@keyframes sIn{
  0%{opacity:0;transform:translateY(48px) scale(.966);filter:blur(12px)}
  30%{filter:blur(0)}
  68%{transform:translateY(-4px) scale(1.004)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

/* Stagger pops */
.pop{opacity:0;animation:popIn .72s var(--spring) forwards}
.p0{animation-delay:.04s}.p1{animation-delay:.13s}.p2{animation-delay:.23s}
.p3{animation-delay:.35s}.p4{animation-delay:.48s}.p5{animation-delay:.62s}.p6{animation-delay:.78s}
@keyframes popIn{
  0%{opacity:0;transform:translateY(24px) scale(.88);filter:blur(8px)}
  38%{opacity:1;filter:blur(0)}
  68%{transform:translateY(-4px) scale(1.007)}
  84%{transform:translateY(1px) scale(.999)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
.tag-pop{opacity:0;animation:tagPop .65s var(--ease) .16s forwards}
@keyframes tagPop{
  0%{opacity:0;letter-spacing:.26em;filter:blur(3px)}
  55%{opacity:1;filter:blur(0)}
  100%{opacity:1;letter-spacing:.17em}
}

/* Logo ring */
.logo-ring{position:relative;display:inline-block;animation:breathe 7s ease-in-out infinite;margin-bottom:10px}
.logo-ring::before{content:"";position:absolute;inset:-10px;border-radius:30px;background:radial-gradient(circle,rgba(80,170,120,.13) 0%,transparent 70%);animation:halo 7s ease-in-out infinite}
.logo-ring img{position:relative;display:block;width:56px;height:56px;border-radius:16px;object-fit:contain;box-shadow:0 10px 32px rgba(29,61,50,.15),0 3px 8px rgba(29,61,50,.09)}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-4px) scale(1.014)}}
@keyframes halo{0%,100%{opacity:.50;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}

/* Welcome screen */
.welcome{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%}
.w-quote-bar{
  width:100%;max-width:400px;margin-bottom:14px;
  padding:11px 14px 11px 16px;
  background:rgba(55,107,85,.056);border:1.5px solid rgba(55,107,85,.14);
  border-radius:14px;text-align:left;position:relative;
}
.w-quote-bar::before{
  content:"C";position:absolute;top:-7px;left:10px;
  font-size:2rem;line-height:1;font-weight:800;
  color:var(--gs);opacity:.26;font-family:Georgia,serif;pointer-events:none;
}
.w-quote-text{font-size:clamp(.73rem,2.8vw,.86rem);font-weight:400;font-style:italic;color:var(--tb);line-height:1.58;opacity:.92;padding-top:2px}
.w-quote-attr{display:block;margin-top:5px;font-size:.58rem;font-weight:700;font-style:normal;letter-spacing:.11em;text-transform:uppercase;color:var(--gs);opacity:.76}
.w-tag{font-size:.62rem;font-weight:700;letter-spacing:.17em;text-transform:uppercase;color:var(--gs);margin-bottom:7px}
.w-title{font-size:clamp(1.85rem,8vw,2.8rem);font-weight:800;line-height:1.06;letter-spacing:-.032em;color:var(--td);margin-bottom:5px}
.w-sub{font-size:clamp(.81rem,3vw,.92rem);font-weight:400;font-style:italic;color:var(--ts);line-height:1.58;opacity:.88;margin-bottom:18px}
.w-hint{font-size:.64rem;font-weight:500;color:var(--tf);margin-top:10px;letter-spacing:.04em;opacity:.76}

/* CTA button */
.cta{
  display:inline-flex;align-items:center;justify-content:center;gap:9px;
  padding:15px 34px;border-radius:999px;border:none;cursor:pointer;
  font-family:inherit;font-size:clamp(.92rem,3.5vw,1rem);font-weight:700;
  letter-spacing:.01em;color:#fff;text-decoration:none;
  background:linear-gradient(135deg,var(--gm) 0%,var(--g) 100%);
  box-shadow:0 10px 32px rgba(29,61,50,.22),0 3px 8px rgba(29,61,50,.12),inset 0 1px 0 rgba(255,255,255,.14);
  transition:transform .24s var(--spring),box-shadow .24s var(--out);
  position:relative;overflow:hidden;
  min-height:52px;touch-action:manipulation;
  -webkit-user-select:none;
}
.cta::before{content:"";position:absolute;inset:0;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.10) 0%,transparent 50%);pointer-events:none}
.cta:active{transform:scale(.954);transition-duration:.07s}
.cta:disabled{opacity:.34;cursor:not-allowed;transform:none!important;box-shadow:none}

/* Resume card */
.resume-card{width:100%;max-width:380px;margin:2px auto 0;background:rgba(55,107,85,.06);border:1.5px solid rgba(55,107,85,.16);border-radius:16px;padding:14px 16px;text-align:center}
.resume-card p{font-size:.83rem;font-weight:500;color:var(--tb);margin-bottom:11px;line-height:1.5}
.resume-card strong{color:var(--td);font-weight:700}
.resume-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.btn-r{display:inline-flex;align-items:center;gap:6px;padding:12px 20px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-size:.84rem;font-weight:700;color:#fff;background:var(--g);box-shadow:0 6px 18px rgba(29,61,50,.20);transition:transform .22s var(--spring);min-height:48px;touch-action:manipulation}
.btn-r:active{transform:scale(.96)}
.btn-f{display:inline-flex;align-items:center;gap:5px;padding:12px 14px;border-radius:999px;border:1.5px solid var(--gg);background:transparent;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:600;color:var(--ts);transition:background .2s,color .2s;min-height:48px;touch-action:manipulation}
.btn-f:active{background:rgba(160,200,180,.14)}

/* Form screens */
.scr{display:flex;flex-direction:column;align-items:center;text-align:center;width:100%}
.scr-q{font-size:clamp(1.5rem,7vw,2.4rem);font-weight:800;line-height:1.12;letter-spacing:-.026em;color:var(--td);margin-bottom:8px}
.scr-sub{font-size:clamp(.81rem,3vw,.88rem);font-weight:400;font-style:italic;color:var(--ts);margin-bottom:22px;line-height:1.6}
.fblock{width:100%;max-width:360px;display:flex;flex-direction:column;gap:11px;margin-bottom:18px}
.fwrap{width:100%;text-align:left}
.flabel{display:block;font-size:.60rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gs);margin-bottom:6px;padding-left:3px}
.flabel span{font-weight:500;text-transform:none;letter-spacing:.04em;color:var(--tf);font-size:.60rem}
.finp{
  width:100%;padding:15px 17px;border-radius:14px;
  border:2px solid var(--gg);
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  font-family:inherit;
  /* 16px CRITICAL: prevents iOS auto-zoom on focus */
  font-size:16px;
  font-weight:600;color:var(--td);outline:none;
  box-shadow:0 2px 10px rgba(29,61,50,.04);
  transition:border-color .22s var(--out),box-shadow .22s var(--out);
  appearance:none;-webkit-appearance:none;
}
.finp.single{text-align:center;font-size:16px}
.finp::placeholder{color:var(--tf);font-weight:400;font-style:italic}
.finp:focus{border-color:var(--g);box-shadow:0 0 0 4px rgba(55,107,85,.10),0 4px 18px rgba(29,61,50,.08)}
.finp.err{border-color:#D06060;box-shadow:0 0 0 3px rgba(208,96,96,.10)}
.ferr{font-size:.68rem;font-weight:500;color:#B84040;margin-top:5px;padding-left:3px;display:none}
.ferr.show{display:block}

/* Quiz screen */
.quiz{display:flex;flex-direction:column;width:100%}
.pt{width:100%;height:3px;border-radius:999px;background:rgba(160,196,178,.2);overflow:hidden;margin-bottom:7px}
.pf{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gmi),var(--g));transition:width 1.1s var(--out);box-shadow:0 0 5px rgba(55,107,85,.35)}
.pr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pcat{font-size:.60rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gs)}
.pnum{font-size:.64rem;font-weight:500;color:var(--tf);letter-spacing:.04em}
.ph{font-size:.68rem;font-weight:700;font-style:italic;color:var(--gs);margin-bottom:16px}
.qh{font-size:clamp(1.18rem,5.5vw,1.85rem);font-weight:800;line-height:1.24;letter-spacing:-.018em;color:var(--td);margin-bottom:6px}
.qc{font-size:clamp(.71rem,2.5vw,.76rem);font-weight:400;font-style:italic;color:var(--ts);margin-bottom:12px;line-height:1.5;opacity:.88}
.opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}

/* Option cards */
.opt{
  display:flex;align-items:center;gap:12px;width:100%;
  padding:14px 14px;border-radius:14px;
  background:var(--surface);
  border:1.5px solid rgba(206,229,216,.85);
  box-shadow:0 1px 7px rgba(29,61,50,.03);
  cursor:pointer;font-family:inherit;
  font-size:clamp(.80rem,3vw,.90rem);font-weight:500;
  color:var(--tb);text-align:left;line-height:1.42;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .18s var(--out),box-shadow .18s var(--out),background .18s var(--out),transform .15s var(--spring),color .18s;
  position:relative;overflow:hidden;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  /* Good mobile touch target */
  min-height:54px;
  touch-action:manipulation;
}
.opt::after{content:"";position:absolute;top:0;left:0;right:0;height:46%;border-radius:inherit;background:linear-gradient(180deg,rgba(255,255,255,.42) 0%,transparent 100%);pointer-events:none}
.opt:active:not(.sel){transform:scale(.974);transition-duration:.06s}
.opt.sel{
  border-color:var(--g);border-width:2px;
  background:linear-gradient(135deg,rgba(206,229,216,.55),rgba(232,242,236,.40));
  color:var(--td);
  box-shadow:0 5px 24px rgba(29,61,50,.10),0 0 0 4px rgba(55,107,85,.06);
  transform:scale(1.007);
}
.ring{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(160,196,178,.65);display:flex;align-items:center;justify-content:center;transition:border-color .18s var(--out),background .18s var(--out),transform .24s var(--spring);background:transparent}
.opt.sel .ring{border-color:var(--g);background:var(--g);transform:scale(1.18)}
.ring svg{display:none}.opt.sel .ring svg{display:block}
.opt-txt{flex:1}

/* Back button */
.back{
  display:inline-flex;align-items:center;gap:5px;
  padding:10px 16px 10px 12px;border-radius:999px;border:none;background:transparent;
  cursor:pointer;font-family:inherit;font-size:.80rem;font-weight:600;color:var(--tf);
  transition:color .2s,background .2s;
  min-height:46px;touch-action:manipulation;
}
.back:active{color:var(--ts);background:rgba(160,196,178,.12)}

/* Done screen */
.done-halo{position:relative;margin-bottom:18px}
.done-halo::before{content:"";position:absolute;inset:-16px;border-radius:50%;background:radial-gradient(circle,rgba(80,170,120,.16) 0%,transparent 70%);animation:halo 4s ease-in-out infinite}
.done-circle{position:relative;width:68px;height:68px;border-radius:50%;background:linear-gradient(145deg,var(--gm),var(--g));display:flex;align-items:center;justify-content:center;box-shadow:0 12px 40px rgba(29,61,50,.26),0 3px 10px rgba(29,61,50,.14);animation:popIn .8s var(--spring) both}
.done-logo{width:40px;height:40px;border-radius:11px;object-fit:contain;margin-bottom:10px;opacity:.88;box-shadow:0 5px 16px rgba(29,61,50,.12)}
.done-h{font-size:clamp(1.5rem,7vw,2.4rem);font-weight:800;line-height:1.12;letter-spacing:-.026em;color:var(--td);margin-bottom:10px}
.done-p{font-size:clamp(.82rem,2.8vw,.94rem);font-weight:400;font-style:italic;color:var(--tb);line-height:1.68;max-width:300px;margin:0 auto 7px;opacity:.88}
.done-hint{font-size:.74rem;font-weight:500;color:var(--tf);margin-bottom:24px;line-height:1.6}
.save-msg{font-size:.66rem;font-weight:500;color:var(--gs);margin-top:11px;min-height:16px;letter-spacing:.02em;opacity:.85;transition:color .3s}

/* Keyframes */
@keyframes fadeUp{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}

.wm{
  position:fixed;bottom:calc(var(--sab) + 7px);left:50%;transform:translateX(-50%);
  font-size:.50rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(95,154,128,.17);pointer-events:none;z-index:5;white-space:nowrap;
}

/* Small phones (SE, 375px) */
@media(max-width:390px){
  .w-title{font-size:clamp(1.65rem,7.8vw,2.1rem)}
  .qh{font-size:clamp(1.08rem,5.5vw,1.5rem)}
  .opts{gap:6px}
  .opt{padding:12px 12px;min-height:50px;font-size:.80rem}
  .cta{padding:14px 26px}
  .w-quote-text{font-size:.72rem}
  #stage{padding-top:calc(var(--sat) + 54px)}
}

/* Landscape phones */
@media(max-height:520px) and (orientation:landscape){
  #stage{
    padding-top:calc(var(--sat) + 50px);
    padding-bottom:calc(var(--sab) + 10px);
    align-items:flex-start;
  }
  .w-quote-bar{display:none}
  .logo-ring{margin-bottom:5px}
  .logo-ring img{width:40px;height:40px}

const TOTAL=Qs.length;

let muted=false,playing=false,busy=false;

function saveP(){try{localStorage.setItem(SK,JSON.stringify({userName,userEmail,userPhone,qi,answers}))}catch(e){}}
function loadP(){try{const d=JSON.parse(localStorage.getItem(SK)||"null");if(d&&d.userName){userName=d.userName;userEmail=d.userEmail||"";userPhone=d.userPhone||"";qi=d.qi||0;answers=d.answers||{};return true}}catch(e){}return false}

const bgm=document.getElementById("bgm"),mBtn=document.getElementById("mute-btn");
function setIcon(){mBtn.innerHTML=muted?`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#376B55" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`:`<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#376B55" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`}
function startAudio(){
  if(playing)return;
  bgm.volume=0.10;
  bgm.play().then(()=>{playing=true;muted=false;setIcon()}).catch(()=>{
    muted=true;setIcon();
    document.addEventListener("pointerdown",()=>{bgm.volume=0.10;bgm.play().then(()=>{playing=true;muted=false;setIcon()}).catch(()=>{})},{once:true});
  });
}
mBtn.addEventListener("click",()=>{
  if(!playing){bgm.volume=0.10;bgm.play().then(()=>{playing=true;muted=false;setIcon()}).catch(()=>{});return}
  muted=!muted;bgm.muted=muted;setIcon();
});

const sc=document.getElementById("screen");
function goTo(fn){
  if(busy)return;busy=true;
  sc.classList.remove("s-in");sc.classList.add("s-out");
  setTimeout(()=>{
    sc.classList.remove("s-out");fn();
    document.getElementById("stage").scrollTop=0;
    void sc.offsetWidth;
    sc.classList.add("s-in");
    setTimeout(()=>{sc.classList.remove("s-in");busy=false},1050);
  },330);
}

const CHK=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const IB=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
const AR=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

let introActive=true;
function unmuteVideo(){
  const vid=document.getElementById("intro-video"),pill=document.getElementById("unmute-pill");
  if(vid){vid.muted=false;vid.volume=1.0}
  if(pill){pill.classList.add("gone");setTimeout(()=>pill.remove(),400)}
}
function endIntro(){
  if(!introActive)return;introActive=false;startAudio();
  const w=document.getElementById("intro-wrap");
  if(w){w.classList.add("done");setTimeout(()=>w.remove(),2200)}
}
function skipIntro(){const v=document.getElementById("intro-video");if(v)v.pause();endIntro()}

document.addEventListener("DOMContentLoaded",()=>{
  const vid=document.getElementById("intro-video");
  if(!vid){endIntro();return}
  vid.muted=true;
  vid.setAttribute("playsinline","");
  vid.setAttribute("webkit-playsinline","");
  const p=vid.play();
  if(p!==undefined){
    p.catch(()=>{
      const sb=document.getElementById("skip-btn");
      if(sb){sb.style.opacity="1";sb.style.animation="none"}
    });
  }
});

        <div class="resume-card p4 pop">

            <button class="btn-r" id="bc">Continue ${AR}</button>

      `:`

  document.getElementById("bc")?.addEventListener("click",()=>{if(!busy)goTo(showQuiz)});

function showName(){
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <h2 class="scr-q p1 pop">What should we<br>call you, Champ?</h2>

          placeholder="Your first name&hellip;"

          spellcheck="false" maxlength="40" value="${userName}"/>
      </div>
      <div class="p4 pop">
        <button class="cta" id="ng" ${userName?"":"disabled"}>Continue &nbsp;${AR}</button>
      </div>
    </div>`;
  const inp=document.getElementById("nf"),btn=document.getElementById("ng");
  inp.addEventListener("input",()=>{btn.disabled=!inp.value.trim()});
  inp.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();if(!btn.disabled)btn.click()}});
  btn.addEventListener("click",()=>{const v=inp.value.trim();if(!v)return;userName=v;saveP();goTo(showContact)});
  setTimeout(()=>inp.focus(),920);
}

function showContact(){
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><div class="logo-ring"><img src="${LOGO}" alt="SmartCrick AI"/></div></div>
      <h2 class="scr-q p1 pop">Stay in touch,<br>${userName}.</h2>
      <p class="scr-sub p2 pop">How should SmartCrick AI reach you?</p>
      <div class="fblock p3 pop">
        <div class="fwrap">
          <label class="flabel" for="fe">Email address <span>&middot; required</span></label>
          <input class="finp" id="fe" type="email" inputmode="email"
            placeholder="you@example.com" value="${userEmail}"
            autocomplete="email" autocorrect="off" autocapitalize="none"
            spellcheck="false" maxlength="120"/>
          <p class="ferr" id="ee">Please enter a valid email address.</p>
        </div>
        <div class="fwrap">
          <label class="flabel" for="fp">Phone number <span>&middot; optional</span></label>
          <input class="finp" id="fp" type="tel" inputmode="tel"
            placeholder="+1 234 567 8900" value="${userPhone}"
            autocomplete="tel" autocorrect="off" spellcheck="false" maxlength="20"/>
        </div>
      </div>
      <div class="p4 pop">
        <button class="cta" id="cg" ${userEmail?"":"disabled"}>Continue &nbsp;${AR}</button>
      </div>
      <div class="p5 pop" style="margin-top:9px">
        <button class="back" id="cbk">${IB} Back</button>
      </div>
    </div>`;
  const ei=document.getElementById("fe"),pi=document.getElementById("fp"),
        bt=document.getElementById("cg"),er=document.getElementById("ee");
  const ok=v=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  ei.addEventListener("input",()=>{er.classList.remove("show");ei.classList.remove("err");bt.disabled=!ei.value.trim()});
  ei.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();pi.focus()}});
  pi.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();if(!bt.disabled)bt.click()}});
  bt.addEventListener("click",()=>{
    const v=ei.value.trim();
    if(!ok(v)){ei.classList.add("err");er.classList.add("show");ei.focus();return}
    userEmail=v;userPhone=pi.value.trim();saveP();goTo(showQuiz);
  });
  document.getElementById("cbk").addEventListener("click",()=>{if(!busy)goTo(showName)});
  setTimeout(()=>{if(!userEmail)ei.focus()},920);
}

function showQuiz(){
  const d=Qs[qi],pct=((qi+1)/TOTAL*100).toFixed(1),sel=answers[qi],ctx=CTX[d.cat]||"";
  sc.innerHTML=`
    <div class="quiz">
      <div class="p0 pop">
        <div class="pt"><div class="pf" style="width:${pct}%"></div></div>
        <div class="pr"><span class="pcat">${d.cat}</span><span class="pnum">${qi+1}&thinsp;/&thinsp;${TOTAL}</span></div>
        <p class="ph">For you, ${userName} &darr;</p>
      </div>
      <h2 class="qh p1 pop">${d.q}</h2>
      <p class="qc p2 pop">${ctx}</p>
      <div class="opts p3 pop">
        ${d.opts.map(o=>`
          <button class="opt${sel===o?" sel":""}" data-txt="${o.replace(/"/g,"&quot;")}">
            <span class="ring">${sel===o?CHK:""}</span>
            <span class="opt-txt">${o}</span>
          </button>`).join("")}
      </div>
      <div class="p4 pop">
        <button class="back" id="bk">${IB} Back</button>
      </div>
    </div>`;
  sc.querySelectorAll(".opt").forEach(btn=>{
    btn.addEventListener("click",()=>{
      if(busy)return;
      const txt=btn.dataset.txt;
      answers[qi]=txt;saveP();
      sc.querySelectorAll(".opt").forEach(b=>{
        const y=b.dataset.txt===txt;
        b.classList.toggle("sel",y);
        b.querySelector(".ring").innerHTML=y?CHK:"";
        b.style.pointerEvents="none";
      });
      document.getElementById("bk").style.pointerEvents="none";
      setTimeout(()=>{
        if(qi<TOTAL-1){qi++;saveP();goTo(showQuiz)}
        else goTo(showDone);
      },340);
    });
  });
  document.getElementById("bk")?.addEventListener("click",()=>{
    if(!busy){if(qi===0)goTo(showContact);else{qi--;goTo(showQuiz)}}
  });
}

function showDone(){
  clearP();
  sc.innerHTML=`
    <div class="scr">
      <div class="p0 pop"><img class="done-logo" src="${LOGO}" alt="SmartCrick AI"/></div>
      <div class="done-halo p1 pop"><div class="done-circle">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div></div>
      <h2 class="done-h p2 pop">You&rsquo;re all set,<br>${userName}!</h2>
      <p class="done-p p3 pop">Your personalised cricket journey has been crafted.<br>SmartCrick AI is ready when you are.</p>
      <p class="done-hint p4 pop">Step onto the field. The best version of you awaits.</p>
      <div class="p5 pop"><a href="https://smartcricai.base44.app" class="cta" style="text-decoration:none">Start Training &nbsp;${AR}</a></div>
      <p class="save-msg p6 pop" id="sm">Saving your responses&hellip;</p>
    </div>`;
  submitToSheets();
}

function submitToSheets(){
  const m=document.getElementById("sm");
  if(!SHEET_URL){if(m)m.textContent="";return}
  fetch(SHEET_URL,{
    method:"POST",mode:"no-cors",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:userName,email:userEmail,phone:userPhone||"—",
      questions:Qs.map(q=>q.q),
      answers:Qs.map((_,i)=>answers[i]||""),
    })
  }).then(()=>{if(m){m.textContent="✓ Responses saved";m.style.color="var(--gs)"}})
    .catch(()=>{if(m){m.textContent="⚠ Could not save";m.style.color="var(--tf)"}});
}

setIcon();
showWelcome();
</script>
</body>
</html>
